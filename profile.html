<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — мій профіль</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="theme.js"></script>
<script src="paywall.js"></script>
<link rel="stylesheet" href="theme.css" />
<style>
  body{
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 18px) 20px 12px;
    overflow-y:auto; gap:16px;
  }
  body > *{ position:relative; z-index:1; }
  .bg-dots, .bg-aura{ z-index:0; }


  /* head */
  .profile-head{ position:relative; width:100%; max-width:440px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    text-align:center; flex-shrink:0; }
  /* Edit affordance pinned top-LEFT of the header — the top-right corner belongs
     to the fixed Stars wallet badge, which used to overlap/hide the gear. */
  .edit-gear{ position:absolute; top:0; left:0; width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:17px;
    background:var(--faux-glass); border:1px solid var(--glass-border); color:var(--text);
    cursor:pointer; font-family:inherit; transition:transform .12s ease, opacity .12s ease; }
  .edit-gear:active{ transform:scale(.9); opacity:.8; }
  .ava-btn{ position:relative; border:none; background:none; padding:0; cursor:pointer; }
  .ava-badge{ position:absolute; right:2px; bottom:2px; width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:15px;
    background:linear-gradient(120deg, var(--a2), var(--a1)); color:#fff;
    border:2px solid var(--bg); box-shadow:0 4px 12px -4px var(--glow); }
  .name-age{ font-size:22px; font-weight:700; letter-spacing:-0.3px; }
  .meta{ font-size:14px; color:var(--hint); }
  .goal-badge{ display:inline-block; font-size:13px; font-weight:600; padding:7px 15px;
    border-radius:999px; color:#fff; background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 8px 22px -10px var(--glow); }

  /* Persistent Stars wallet — glowing premium (--neon-p) pill, pinned top-right,
     tappable → opens the Stars shop. Always-visible balance across the profile. */
  .stars-badge{ position:fixed; z-index:6;
    top:calc(env(safe-area-inset-top) + 12px); right:14px;
    display:inline-flex; align-items:center; gap:5px; padding:7px 13px;
    border-radius:999px; text-decoration:none; color:#fff;
    font-size:13.5px; font-weight:800; letter-spacing:.02em;
    background:linear-gradient(120deg, color-mix(in srgb, var(--neon-p) 80%, #000), var(--neon-p));
    border:1px solid color-mix(in srgb, var(--neon-p) 55%, transparent);
    box-shadow:0 0 18px -2px color-mix(in srgb, var(--neon-p) 70%, transparent),
      inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .12s ease; }
  .stars-badge:active{ transform:scale(.94); }
  .stars-badge .sb-star{ font-size:14px; line-height:1; }

  /* sections */
  .section{ width:100%; max-width:440px; padding:16px 18px; flex-shrink:0; }
  .sec-title{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.09em;
    color:var(--hint); margin-bottom:10px; }
  .sec-title.grad{ background:linear-gradient(100deg, var(--a1), var(--a2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .sec-body{ font-size:14px; line-height:1.6; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ font-size:13px; font-weight:600; padding:7px 13px; border-radius:999px;
    color:#fff; background:linear-gradient(120deg, var(--a2), var(--a1)); }
  .chip.outline{ background:var(--faux-glass); border:1px solid var(--glass-border); color:var(--a1); }

  /* ---- Monolithic frosted card (AI hook priority) ----
     One coherent frosted pane. Personality tags flow straight into the Gemini
     Barnum text with no inner divider; grouped blocks (About + Interests) share
     the same pane, separated only by a hairline rule. */
  .monolith-card{ width:100%; max-width:440px; padding:18px 18px 20px; flex-shrink:0;
    background:var(--glass-grad);
    -webkit-backdrop-filter:blur(12px) saturate(1.5); backdrop-filter:blur(12px) saturate(1.5);
    border:1px solid var(--glass-border); border-radius:22px;
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-hi); }
  .monolith-card .mono-tags{ margin-bottom:12px; }
  /* Barnum text sits IMMEDIATELY beneath the tags — no gap, no border. */
  .monolith-card .mono-text{ font-size:14px; line-height:1.6; }
  /* Grouped sub-blocks (About Me + Interests) inside one shared pane. */
  .mono-block + .mono-block{ margin-top:16px; padding-top:16px;
    border-top:1px solid var(--glass-border); }
  .mono-empty{ font-size:14px; line-height:1.6; color:var(--hint); }

  /* stars wallet + referral */
  .stars-card{ display:flex; flex-direction:column; gap:12px; }
  .stars-row{ display:flex; align-items:center; gap:12px; }
  .stars-ico{ font-size:30px; line-height:1; flex-shrink:0; }
  .stars-info{ flex:1; min-width:0; }
  .stars-bal{ font-size:16px; font-weight:600; }
  .stars-bal b{ color:var(--a1); font-size:19px; font-weight:800; }
  .stars-sub{ font-size:12.5px; color:var(--hint); margin-top:2px; line-height:1.4; }

  /* action buttons */
  .actions{ width:100%; max-width:440px; display:flex; flex-direction:column; gap:10px; flex-shrink:0; }
  .btn-glass{ width:100%; border-radius:999px; padding:15px; font-size:15px; font-weight:600;
    color:var(--a1); background:var(--faux-glass); border:1px solid var(--glass-border);
    cursor:pointer; font-family:inherit; transition:transform .12s ease, opacity .12s ease; }
  .btn-glass:active{ transform:scale(.98); opacity:.9; }

  /* footer: unobtrusive compliance links — tiny grey text, no exit friction */
  .footer{ width:100%; max-width:440px; display:flex; flex-direction:row; flex-wrap:wrap;
    align-items:center; justify-content:center; gap:8px; flex-shrink:0; margin-top:18px; }
  .foot-link{ font-size:12px; color:var(--hint); opacity:.65; background:none; border:none;
    padding:0; cursor:pointer; font-family:inherit; text-decoration:none; letter-spacing:.01em;
    transition:opacity .12s ease; }
  .foot-link:active{ opacity:.4; }
  .foot-sep{ font-size:12px; color:var(--hint); opacity:.35; }

  /* edit form */
  .edit-form{ display:flex; flex-direction:column; gap:12px; }
  .field label{ display:block; font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.09em; color:var(--hint); margin-bottom:6px; }
  .field input, .field select, .field textarea{
    width:100%; border:1px solid var(--glass-border); border-radius:14px; padding:12px 14px;
    font-size:15px; font-family:inherit; color:var(--text); background:var(--faux-glass);
    outline:none; }
  .field textarea{ resize:none; min-height:84px; line-height:1.5; }
  .field select{ -webkit-appearance:none; appearance:none; }
  .save-row{ display:flex; gap:10px; }
  .save-row .btn-primary{ flex:1; padding:14px; }
  .save-row .btn-glass{ flex:1; }
  .save-note{ font-size:12px; color:var(--hint); text-align:center; min-height:16px; }

  /* ---- Profile depth (gamification) ---- */
  .depth-top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
  .depth-pct{ font-size:18px; font-weight:800;
    background:linear-gradient(100deg, var(--a1), var(--a2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .depth-bar{ position:relative; width:100%; height:12px; border-radius:999px; overflow:hidden;
    background:var(--faux-glass); border:1px solid var(--glass-border); }
  .depth-fill{ position:absolute; inset:0 auto 0 0; width:40%; border-radius:999px;
    background:linear-gradient(100deg, var(--a2), var(--a1));
    box-shadow:0 0 14px 1px var(--glow); transition:width .5s cubic-bezier(.2,.8,.2,1);
    animation:depthPulse 2.4s ease-in-out infinite; }
  @keyframes depthPulse{ 0%,100%{ filter:brightness(1); } 50%{ filter:brightness(1.25); } }
  .depth-widget{ margin-top:16px; padding:14px; border-radius:16px;
    background:var(--faux-glass); border:1px solid var(--glass-border); }
  .depth-q{ font-size:14px; font-weight:600; line-height:1.5; }
  .depth-input{ width:100%; margin-top:12px; border:1px solid var(--glass-border); border-radius:14px;
    padding:12px 14px; font-size:15px; font-family:inherit; color:var(--text);
    background:var(--bg); outline:none; resize:none; min-height:72px; line-height:1.5; }
  .depth-submit{ width:100%; margin-top:12px; }
  .depth-note{ font-size:12.5px; color:var(--hint); text-align:center; min-height:16px; margin-top:10px; }

  /* achievements grid — neon badge chips */
  .achieve-grid{ display:flex; flex-wrap:wrap; gap:10px; }
  .achieve-badge{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700;
    padding:9px 14px; border-radius:14px; color:#fff;
    background:linear-gradient(135deg, rgba(124,58,237,.28), rgba(236,72,153,.28));
    border:1px solid rgba(196,120,255,.5);
    box-shadow:0 0 18px -6px var(--glow), inset 0 0 12px -6px rgba(255,150,240,.6); }
  .achieve-badge .em{ font-size:17px; line-height:1; }
  .achieve-empty{ font-size:13.5px; color:var(--hint); line-height:1.5; }

  /* ---- Dark Mode (18+) — isolated crimson monolith ---- */
  /* Distinct crimson glass so the 18+ layer never blends with standard sections. */
  .dark-card{ background:linear-gradient(158deg, rgba(48,10,26,.72), rgba(28,8,18,.6));
    border:1px solid rgba(255,86,64,.32);
    box-shadow:0 16px 44px -18px rgba(255,60,50,.5), inset 0 1px 0 rgba(255,150,120,.12); }
  .grad-crimson{ background:linear-gradient(100deg, #ff7a5c, #ff2f88);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  /* 18+ gate: the toggle stays disabled until age is confirmed (client-side). */
  .age-gate{ display:flex; align-items:center; gap:10px; margin-top:14px; cursor:pointer;
    font-size:13px; font-weight:600; color:#ffc9bd; user-select:none; }
  .age-gate input{ position:absolute; opacity:0; width:0; height:0; }
  .age-box{ width:22px; height:22px; border-radius:7px; flex-shrink:0; position:relative;
    background:rgba(255,255,255,.06); border:1.5px solid rgba(255,120,90,.55);
    transition:background .16s ease, border-color .16s ease; }
  .age-box::after{ content:'✓'; position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; font-size:14px; color:#fff; opacity:0; transition:opacity .16s ease; }
  .age-gate input:checked + .age-box{ background:linear-gradient(120deg, #ff5640, #be2878);
    border-color:transparent; }
  .age-gate input:checked + .age-box::after{ opacity:1; }
  /* Disabled switch reads as locked until the gate is satisfied. */
  .dark-card .ios-switch input:disabled + .ios-slider{ opacity:.45; cursor:not-allowed; }
  .dark-head{ display:flex; align-items:center; justify-content:space-between; gap:14px; }
  .dark-desc{ font-size:12.5px; color:var(--hint); line-height:1.45; margin-top:2px; }
  .dark-markers{ display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
  .dark-marker{ font-size:12.5px; font-weight:700; padding:6px 12px; border-radius:999px; color:#fff;
    background:linear-gradient(120deg, rgba(255,86,64,.9), rgba(190,40,120,.92));
    box-shadow:0 6px 16px -8px rgba(255,70,60,.7); }
  .dark-redo{ margin-top:14px; font-size:12.5px; color:var(--a1); background:none; border:none;
    padding:0; cursor:pointer; font-family:inherit; text-decoration:underline; }
  /* iOS-style switch */
  .ios-switch{ position:relative; display:inline-block; width:52px; height:31px; flex-shrink:0; }
  .ios-switch input{ opacity:0; width:0; height:0; }
  .ios-slider{ position:absolute; inset:0; cursor:pointer; border-radius:999px;
    background:var(--faux-glass); border:1px solid var(--glass-border); transition:background .22s ease; }
  .ios-slider::before{ content:''; position:absolute; height:25px; width:25px; left:3px; top:2px;
    border-radius:50%; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.35); transition:transform .22s ease; }
  .ios-switch input:checked + .ios-slider{
    background:linear-gradient(120deg, #ff5640, #be2878); border-color:transparent; }
  .ios-switch input:checked + .ios-slider::before{ transform:translateX(21px); }

  /* interview overlay — tinted anonymous chat */
  .kv-overlay{ position:fixed; inset:0; z-index:1100; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end; background:rgba(14,4,10,.62);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); opacity:0;
    transition:opacity .22s ease; padding:16px;
    padding-bottom:calc(env(safe-area-inset-bottom) + 16px);
    overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .kv-overlay.show{ opacity:1; }
  .kv-sheet{ width:100%; max-width:440px; border-radius:26px; padding:22px 20px calc(20px + var(--kv-kb, 0px)); margin-top:auto; position:relative;
    background:linear-gradient(160deg, rgba(40,10,26,.96), rgba(20,6,16,.98));
    border:1px solid rgba(255,120,90,.4); box-shadow:0 20px 60px -20px rgba(255,60,50,.5);
    transform:translateY(24px); transition:transform .26s cubic-bezier(.2,.8,.2,1); color:#fff; }
  .kv-overlay.show .kv-sheet{ transform:translateY(0); }
  .kv-close{ position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%;
    border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#fff;
    font-size:15px; cursor:pointer; font-family:inherit; line-height:1; }
  .kv-title{ font-size:15px; font-weight:800; letter-spacing:.04em; }
  .kv-step{ font-size:12px; color:#ffb3a3; margin-top:4px; }
  .kv-q{ font-size:16px; line-height:1.5; margin-top:16px; font-weight:600; }
  .kv-a{ width:100%; margin-top:14px; border:1px solid rgba(255,150,110,.4); border-radius:16px;
    padding:12px 14px; font-size:15px; font-family:inherit; color:#fff; background:rgba(255,255,255,.06);
    outline:none; resize:none; min-height:80px; line-height:1.5; }
  .kv-a::placeholder{ color:rgba(255,255,255,.45); }
  .kv-next{ width:100%; margin-top:14px; border:none; border-radius:999px; padding:15px; font-size:15px;
    font-weight:700; color:#fff; font-family:inherit; cursor:pointer;
    background:linear-gradient(120deg, #ff5640, #be2878); box-shadow:0 12px 30px -12px rgba(255,70,60,.8); }
  .kv-next:disabled{ opacity:.5; cursor:default; }
  .kv-note{ font-size:12.5px; color:#ffb3a3; text-align:center; min-height:16px; margin-top:10px; }
  .kv-priv{ font-size:11.5px; color:rgba(255,255,255,.55); text-align:center; margin-top:12px; line-height:1.45; }
</style>
</head>
<body class="has-tab-bar">
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <a class="stars-badge" id="starsBadge" href="#shop" aria-label="Магазин Stars">
    <span class="sb-star" aria-hidden="true">⭐️</span><b id="starsBalance">0</b>
  </a>


  <div class="profile-head">
    <button class="edit-gear" id="editBtn" aria-label="Редагувати анкету">⚙️</button>
    <button class="ava-btn" id="avaBtn" aria-label="Змінити фото">
      <img class="story-avatar" id="avatar" alt="Фото профілю" hidden />
      <div class="story-avatar-ph" id="avatarPlaceholder">🙂</div>
      <span class="ava-badge">📷</span>
    </button>
    <div class="name-age" id="nameAge"></div>
    <div class="meta" id="meta"></div>
    <span class="goal-badge" id="goalBadge" hidden></span>
  </div>

  <div class="section glass" id="depthSection">
    <div class="depth-top">
      <div class="sec-title grad" style="margin-bottom:0;">Глибина профілю</div>
      <span class="depth-pct" id="depthPct">40%</span>
    </div>
    <div class="depth-bar"><div class="depth-fill" id="depthFill"></div></div>
    <!-- Improve-profile CTA sits directly under the bar to close the UX loop:
         see your depth → tap to raise it. Free males hit the paywall here. -->
    <button class="btn-primary" id="deepenBtn" style="width:100%; margin-top:14px;">✨ Покращити профіль із Sixtio</button>
    <div class="depth-widget" id="depthWidget" hidden>
      <div class="depth-q" id="depthQ">🧠 Дозаповни профіль (+20%)</div>
      <textarea class="depth-input" id="depthInput" maxlength="600"
        placeholder="Відповідай вільно, своїми словами…"></textarea>
      <button class="btn-primary depth-submit" id="depthSubmit">Відповісти (+20%)</button>
      <div class="depth-note" id="depthNote"></div>
    </div>
  </div>

  <!-- AI hook priority: personality analysis surfaces right under the depth bar.
       Tags lead the card and the Barnum text flows immediately beneath them. -->
  <div class="section monolith-card" id="traitsSection" hidden>
    <div class="chips mono-tags" id="traits"></div>
    <div class="mono-text" id="summary"></div>
  </div>

  <!-- 18+ layer isolated in its own crimson monolith; the toggle is locked until
       the age gate below is confirmed (fast, client-side, unbypassable in-UI). -->
  <div class="section monolith-card dark-card" id="darkSection">
    <div class="dark-head">
      <div>
        <div class="sec-title grad-crimson" style="margin-bottom:4px;">🔥 Dark Mode (18+)</div>
        <div class="dark-desc">Анонімний пошук за інтимною сумісністю. Видно лише тим, хто теж увімкнув Dark Mode.</div>
      </div>
      <label class="ios-switch">
        <input type="checkbox" id="darkToggle" disabled />
        <span class="ios-slider"></span>
      </label>
    </div>
    <label class="age-gate">
      <input type="checkbox" id="ageConfirm" />
      <span class="age-box" aria-hidden="true"></span>
      <span>Мені є 18 років</span>
    </label>
    <div class="dark-markers" id="darkMarkers" hidden></div>
    <button class="dark-redo" id="darkRedo" hidden>Пройти інтерв'ю знову</button>
  </div>

  <!-- About Me + Interests share one frosted pane (empty bio → gentle nudge). -->
  <div class="section monolith-card" id="aboutSection">
    <div class="mono-block">
      <div class="sec-title">Про мене</div>
      <div class="sec-body" id="bio"></div>
    </div>
    <div class="mono-block" id="interestsBlock" hidden>
      <div class="sec-title">Інтереси</div>
      <div class="chips" id="interests"></div>
    </div>
  </div>

  <!-- Compact referral banner: single row (balance + snappy reward + inline CTA)
       to beat banner blindness — roughly half the previous height. -->
  <div class="section glass stars-card" id="starsSection" style="padding:12px 14px;">
    <div class="stars-row">
      <span class="stars-ico" aria-hidden="true">🎁</span>
      <div class="stars-info">
        <div class="stars-sub">💸 +15 ⭐️ за кожного друга (після інтерв'ю)</div>
      </div>
      <button class="btn-primary" id="inviteBtn" style="padding:11px 16px; font-size:14px; white-space:nowrap;">🎁 Запросити</button>
    </div>
  </div>

  <div class="section glass" id="achieveSection">
    <div class="sec-title grad">🏅 Досягнення</div>
    <div class="achieve-grid" id="achieveGrid"></div>
  </div>

  <div class="section glass" id="editSection" hidden>
    <div class="sec-title">Редагування анкети</div>
    <form class="edit-form" id="editForm">
      <div class="field">
        <label for="fSeeking">Кого шукаю</label>
        <select id="fSeeking">
          <option value="male">Чоловіка</option>
          <option value="female">Жінку</option>
          <option value="any">Неважливо</option>
        </select>
      </div>
      <div class="field">
        <label for="fGoal">Мета</label>
        <select id="fGoal">
          <option value="longterm">Довготривалі стосунки</option>
          <option value="fun">Розважитись</option>
          <option value="situational">По ситуації</option>
        </select>
      </div>
      <div class="field">
        <label for="fAge">Вік</label>
        <input id="fAge" type="number" min="18" max="100" inputmode="numeric" />
      </div>
      <div class="field">
        <label for="fCity">Місто</label>
        <input id="fCity" type="text" maxlength="100" />
      </div>
      <div class="field">
        <label for="fInterests">Інтереси (через кому)</label>
        <input id="fInterests" type="text" />
      </div>
      <div class="field">
        <label for="fBio">Про мене</label>
        <textarea id="fBio" maxlength="600"></textarea>
      </div>
      <div class="save-row">
        <button type="button" class="btn-glass" id="cancelBtn">Скасувати</button>
        <button type="submit" class="btn-primary">Зберегти</button>
      </div>
      <div class="save-note" id="saveNote"></div>
    </form>
  </div>

  <div class="footer">
    <a class="foot-link" href="privacy.html">Політика конфіденційності</a>
    <span class="foot-sep" aria-hidden="true">·</span>
    <button class="foot-link" id="deleteBtn">Видалити акаунт</button>
  </div>

  <input type="file" id="photoInput" accept="image/*" hidden />

  <nav class="tab-bar">
    <a class="tab-item" href="matches.html"><span class="ico">💜</span>Метчі</a>
    <a class="tab-item" href="chat.html"><span class="ico">💬</span>Чат</a>
    <a class="tab-item active" href="profile.html"><span class="ico">👤</span>Профіль</a>
  </nav>

  <script>
    (function(){

              if (me && me.user) {
                me.user.profileDepth = res.profileDepth;
                me.user.starsBalance = res.starsBalance;
                localStorage.setItem('sixtio_me', JSON.stringify(me));
              }
            } catch(e){}
            document.getElementById('starsBalance').textContent = res.starsBalance || 0;
            if (current) renderDepth(current);
            if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(e){} }
            note.textContent = res.bonusAwarded
              ? '🎉 Профіль заповнено! +2 ⭐ бонус'
              : 'Готово ✓ Профіль глибший на +20%';
          })
          .catch(function(){
            note.textContent = 'Не вдалося зберегти — спробуй ще раз';
          })
          .then(function(){ btn.disabled = false; });
      });

      load().catch(function(){ /* offline */ });
    })();
  </script>
</body>
</html>
