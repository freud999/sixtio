<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — наш метч</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js"></script>
<script src="theme.js"></script>
<script src="paywall.js"></script>
<link rel="stylesheet" href="theme.css" />
<style>
  body{
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 16px);
    overflow-y:auto; gap:14px;
  }
  body > *{ position:relative; z-index:1; }
  .bg-dots, .bg-aura{ z-index:0; }

  .top-bar{ width:100%; max-width:460px; display:flex; align-items:center; }
  .back{ font-size:24px; color:var(--a1); background:none; border:none; cursor:pointer;
    font-family:inherit; padding:4px 8px 4px 0; line-height:1; }

  .match-card{ width:100%; max-width:460px; border-radius:28px; color:#fff; padding:22px 18px 20px;
    text-align:center;
    background:var(--a2);
    background:radial-gradient(140% 110% at 50% -15%,
      var(--a1) 0%, var(--a2) 52%,
      color-mix(in srgb, var(--a2) 30%, var(--aura-deep)) 100%);
    box-shadow:0 20px 52px -16px var(--glow); }
  .headline{ font-size:16px; font-weight:800; letter-spacing:.04em; opacity:.9; }
  .ava-wrap{ display:flex; justify-content:center; margin:14px 0 4px; }
  .ava{ width:120px; height:120px; border-radius:50%; object-fit:cover;
    border:3px solid rgba(255,255,255,.9); box-shadow:0 10px 28px rgba(0,0,0,.25); }
  .ava-ph{ width:120px; height:120px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:48px; background:rgba(255,255,255,.14);
    border:3px solid rgba(255,255,255,.55); }
  .name{ font-size:23px; font-weight:700; margin-top:6px; }
  .meta{ font-size:14px; color:rgba(255,255,255,.78); margin-top:2px; }
  .vibe{ font-size:14px; font-style:italic; color:rgba(255,255,255,.9); margin-top:8px; }
  .reason{ font-size:14px; line-height:1.6; margin:16px 0 4px; padding:14px 15px; text-align:left;
    border-radius:16px; background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.22); }
  .reason .lbl{ display:block; font-size:10px; font-weight:800; text-transform:uppercase;
    letter-spacing:.12em; color:rgba(255,255,255,.8); margin-bottom:6px; }
  .sub{ font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.12em;
    color:rgba(255,255,255,.65); margin:16px 0 8px; text-align:left; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ font-size:13px; font-weight:600; padding:7px 13px; border-radius:999px; color:#fff;
    background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.3); }
  .chip.outline{ background:transparent; border:1px solid rgba(255,255,255,.35); }
  .bio{ font-size:14px; line-height:1.6; color:rgba(255,255,255,.92); text-align:left; }

  /* Dark Mode (18+) intimate breakdown — identical flame styling to the feed
     card's .card-dark block, adapted to the match profile layout. */
  .dark-box{ margin-top:2px; padding:12px 14px; border-radius:16px; text-align:left;
    background:linear-gradient(120deg, rgba(255,86,64,.22), rgba(190,40,120,.28));
    border:1px solid rgba(255,120,90,.45);
    box-shadow:0 6px 20px -8px rgba(255,70,60,.6); }
  .dark-score{ font-size:14px; font-weight:800; color:#fff; letter-spacing:.01em;
    text-shadow:0 1px 8px rgba(0,0,0,.45); }
  .dark-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .dark-tags.blurred{ filter:blur(5px); opacity:.85; pointer-events:none; }
  .dark-tag{ font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:999px; color:#fff;
    background:rgba(255,120,90,.28); border:1px solid rgba(255,150,110,.5); }
  .dark-hint{ font-size:11.5px; font-weight:600; color:#ffd9cf; margin-top:8px; }
  /* Locked (blurred) intimate box is itself a tap target → Stars shop */
  .dark-box.locked{ cursor:pointer; }
  .dark-box.locked:active{ transform:scale(.985); }
  .write-btn{ width:100%; max-width:460px; border:none; border-radius:999px; padding:16px;
    font-size:16px; font-weight:700; color:var(--a2); background:#fff; cursor:pointer;
    font-family:inherit; box-shadow:0 10px 26px -10px rgba(0,0,0,.3); }
  .write-btn:active{ transform:scale(.98); opacity:.94; }

  /* --- The Why Factor: pulsing neon CTA --- */
  .why-btn{ width:100%; max-width:460px; border:none; border-radius:999px; padding:16px;
    font-size:16px; font-weight:800; color:#fff; cursor:pointer; font-family:inherit;
    letter-spacing:.2px;
    background:linear-gradient(120deg,#4FACFE,#00F2FE 45%,#FF007F);
    box-shadow:0 0 22px -2px rgba(0,242,254,.6), 0 0 30px -6px rgba(255,0,127,.5);
    animation:whyPulse 2.2s ease-in-out infinite; }
  .why-btn:active{ transform:scale(.98); }
  .why-btn:disabled{ opacity:.7; animation:none; cursor:default; }
  @keyframes whyPulse{ 0%,100%{ box-shadow:0 0 18px -4px rgba(0,242,254,.5), 0 0 26px -8px rgba(255,0,127,.4); }
    50%{ box-shadow:0 0 30px 0 rgba(0,242,254,.75), 0 0 40px -4px rgba(255,0,127,.6); } }

  /* --- reveal overlay: glowing frosted glass + typing text --- */
  .why-overlay{ position:fixed; inset:0; z-index:1200; display:flex; align-items:center;
    justify-content:center; padding:20px; background:rgba(9,5,20,.66);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    opacity:0; transition:opacity .24s ease; }
  .why-overlay.show{ opacity:1; }
  .why-sheet{ width:100%; max-width:440px; border-radius:26px; padding:24px 22px 20px; position:relative;
    background:linear-gradient(158deg, rgba(34,23,61,.82), rgba(22,15,41,.9));
    border:1px solid rgba(0,242,254,.28);
    box-shadow:0 24px 70px -20px rgba(0,242,254,.4), inset 0 1px 0 rgba(255,255,255,.08);
    transform:translateY(18px) scale(.98); transition:transform .26s cubic-bezier(.2,.8,.2,1); color:#F4F2FB; }
  .why-overlay.show .why-sheet{ transform:translateY(0) scale(1); }
  .why-close{ position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%;
    border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.06); color:#fff;
    font-size:15px; cursor:pointer; font-family:inherit; line-height:1; }
  .why-title{ font-size:14px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    background:linear-gradient(100deg,#00F2FE,#FF007F); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; }
  .why-body{ font-size:15.5px; line-height:1.65; margin-top:14px; min-height:120px; white-space:pre-wrap; }
  .why-body .caret{ display:inline-block; width:2px; height:1.05em; vertical-align:-2px;
    margin-left:1px; background:#00F2FE; animation:whyCaret .8s step-end infinite; }
  @keyframes whyCaret{ 50%{ opacity:0; } }
  .why-note{ font-size:12.5px; color:#A99FC7; text-align:center; margin-top:14px; min-height:16px; }

  /* --- The Why Factor: premium blur-lock (subsequent reveals) --- */
  .why-sheet.locked{ border-color:color-mix(in srgb, var(--neon-p) 45%, transparent);
    box-shadow:0 24px 70px -20px color-mix(in srgb, var(--neon-p) 55%, transparent),
      inset 0 1px 0 rgba(255,255,255,.08); }
  .why-lockwrap{ position:relative; margin-top:14px; min-height:132px; }
  .why-blur{ font-size:15.5px; line-height:1.65; color:#F4F2FB; opacity:.9;
    filter:blur(6px); -webkit-filter:blur(6px); user-select:none; pointer-events:none; }
  .why-lockcta{ position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px; text-align:center; }
  .why-lockstar{ font-size:30px; line-height:1;
    filter:drop-shadow(0 0 12px color-mix(in srgb, var(--neon-p) 85%, transparent)); }
  .why-unlock{ border:none; border-radius:999px; padding:13px 20px; font-size:15px; font-weight:800;
    color:#fff; font-family:inherit; cursor:pointer; letter-spacing:.2px;
    background:linear-gradient(120deg, color-mix(in srgb, var(--neon-p) 80%, #000), var(--neon-p));
    box-shadow:0 0 26px -4px color-mix(in srgb, var(--neon-p) 75%, transparent); }
  .why-unlock:active{ transform:scale(.97); }
</style>
</head>
<body>
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="top-bar">
    <button class="back" id="back" aria-label="Назад">‹ Назад</button>
  </div>

  <div class="match-card" id="card" hidden>
    <div class="headline led">✨ ВАШ МЕТЧ</div>
    <div class="ava-wrap">
      <img class="ava" id="photo" alt="Фото пари" hidden />
      <div class="ava-ph" id="photoPh">🙂</div>
    </div>
    <div class="name" id="name"></div>
    <div class="meta" id="meta"></div>
    <div class="vibe" id="vibe" hidden></div>
    <div class="reason">
      <span class="lbl">Чому ви пасуєте</span>
      <span id="reason"></span>
    </div>
    <div class="sub" id="traitsLbl" hidden>Характер</div>
    <div class="chips" id="traits"></div>
    <div class="sub" id="interestsLbl" hidden>Інтереси</div>
    <div class="chips" id="interests"></div>
    <div class="sub" id="bioLbl" hidden>Про людину</div>
    <div class="bio" id="bio"></div>
    <div class="sub" id="darkLbl" hidden>🔥 Інтимна сумісність</div>
    <div class="dark-box" id="darkBox" hidden></div>
  </div>

  <button class="why-btn" id="whyBtn" hidden>🧠 Чому ми підходимо один одному?</button>
  <button class="write-btn" id="writeBtn" hidden>Написати повідомлення 💬</button>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
        if (tg.BackButton) { try { tg.BackButton.show(); tg.BackButton.onClick(goBack); } catch(e){} }
      }
      var initData = (tg && tg.initData) || '';
      var matchId = new URLSearchParams(window.location.search).get('match') || null;
      var starsBal = 0;   // wallet balance for the paywall sheet, set from /api/me

      function goBack(){ history.length > 1 ? history.back() : (window.location.href = 'chat.html'); }
      document.getElementById('back').addEventListener('click', goBack);

      function fillChips(id, items, outline){
        var wrap = document.getElementById(id); wrap.innerHTML = '';
        (items || []).forEach(function(it){
          var c = document.createElement('span'); c.className = 'chip' + (outline ? ' outline' : '');
          c.textContent = it; wrap.appendChild(c);
        });
        return (items || []).length > 0;
      }

      function render(m){
        var pt = m.partner || {};
        if (pt.photoUrl) {
          var ph = document.getElementById('photo');
          ph.src = pt.photoUrl; ph.hidden = false;
          document.getElementById('photoPh').hidden = true;
        }
        document.getElementById('name').textContent = pt.name + (pt.age ? ', ' + pt.age : '');
        document.getElementById('meta').textContent = pt.city ? '📍 ' + pt.city : '';
        if (pt.vibe) { var v = document.getElementById('vibe'); v.textContent = '«' + pt.vibe + '»'; v.hidden = false; }
        document.getElementById('reason').textContent = m.reason || '';
        if (fillChips('traits', pt.traits, false)) document.getElementById('traitsLbl').hidden = false;
        if (fillChips('interests', pt.interests, true)) document.getElementById('interestsLbl').hidden = false;
        if (pt.bio) { document.getElementById('bio').textContent = pt.bio; document.getElementById('bioLbl').hidden = false; }

        // Dark Mode (18+): present ONLY when both sides opted in (server-gated).
        // Free males get the % with placeholder tags blurred; the real tags were
        // withheld server-side and are never on the wire for them.
        if (m.darkMode && typeof m.intimateCompatibility === 'number') {
          var box = document.getElementById('darkBox');
          box.innerHTML = '';
          var sc = document.createElement('div'); sc.className = 'dark-score';
          sc.textContent = '🔥 Ваша інтимна сумісність — ' + m.intimateCompatibility + '%';
          box.appendChild(sc);
          var tagList = m.intimateTagsBlurred ? ['••••', '•••', '••••'] : (m.intimateTags || []);
          if (tagList.length) {
            var tw = document.createElement('div');
            tw.className = 'dark-tags' + (m.intimateTagsBlurred ? ' blurred' : '');
            tagList.forEach(function(t){
              var s = document.createElement('span'); s.className = 'dark-tag';
              s.textContent = t; tw.appendChild(s);
            });
            box.appendChild(tw);
          }
          if (m.intimateTagsBlurred) {
            var h = document.createElement('div'); h.className = 'dark-hint';
            h.textContent = SixtioI18n.t('match_locked_hint');
            box.appendChild(h);
            // Deep-link the locked box into the Stars shop, Premium first.
            box.classList.add('locked');
            box.onclick = function(){
              if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
              if (window.SixtioPaywall) {
                window.SixtioPaywall.open({
                  initData: initData, starsBalance: starsBal, highlight: 'premium',
                  subtitle: SixtioI18n.t('pw_locked_subtitle'),
                  onSuccess: function(){ window.location.reload(); }
                });
              }
            };
          } else {
            box.classList.remove('locked');
            box.onclick = null;
          }
          document.getElementById('darkLbl').hidden = false;
          box.hidden = false;
        }
        document.getElementById('card').hidden = false;

        var w = document.getElementById('writeBtn');
        w.hidden = false;
        w.addEventListener('click', function(){
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
          window.location.href = 'conversation.html' + (m.matchId ? '?match=' + encodeURIComponent(m.matchId) : '');
        });

        var why = document.getElementById('whyBtn');
        why.hidden = false;
        why.addEventListener('click', function(){
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
          openWhyFactor(m.matchId, (pt.name || '').split(' ')[0] || 'вами');
        });
      }

      function pick(me){
        if (me.user && typeof me.user.starsBalance === 'number') starsBal = me.user.starsBalance;
        var matches = me.matches || [];
        if (!matches.length) { window.location.replace('matches.html'); return; }
        var m = matchId ? matches.filter(function(x){ return x.matchId === matchId; })[0] : matches[0];
        render(m || matches[0]);
      }

      try {
        var cached = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
        if (cached && cached.matches && cached.matches.length) { pick(cached); }
      } catch(e){}

      fetch('/api/me', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: initData })
      }).then(function(r){ return r.ok ? r.json() : null; })
        .then(function(me){
          if (!me) return;
          if (!me.registered) { window.location.replace('onboarding.html'); return; }
          if (me.user && me.user.gender && window.SixtioTheme) window.SixtioTheme.setGender(me.user.gender);
          localStorage.setItem('sixtio_me', JSON.stringify(me));
          pick(me);
        }).catch(function(){ /* offline — cached shown */ });

      // ---- The Why Factor: fetch + glowing overlay with a typing reveal ------
      function openWhyFactor(mId, name){
        var overlay = document.createElement('div');
        overlay.className = 'why-overlay';
        overlay.innerHTML =
          '<div class="why-sheet">' +
            '<button class="why-close" aria-label="Закрити">✕</button>' +
            '<div class="why-title">🧠 Чому ви підходите</div>' +
            '<div class="why-body" id="whyText"><span class="caret"></span></div>' +
            '<div class="why-note" id="whyNote">Sixtio аналізує вашу сумісність…</div>' +
          '</div>';
        document.body.appendChild(overlay);
        requestAnimationFrame(function(){ overlay.classList.add('show'); });

        var sheet = overlay.querySelector('.why-sheet');
        var bodyEl = overlay.querySelector('#whyText');
        var note = overlay.querySelector('#whyNote');
        var typeTimer = null;
        function close(){
          if (typeTimer) clearInterval(typeTimer);
          overlay.classList.remove('show');
          setTimeout(function(){ if (overlay.parentNode) overlay.remove(); }, 240);
        }
        overlay.querySelector('.why-close').addEventListener('click', close);
        overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });

        function typeOut(text){
          sheet.classList.remove('locked');
          note.textContent = '';
          var i = 0;
          bodyEl.innerHTML = '<span class="caret"></span>';
          var caret = bodyEl.querySelector('.caret');
          typeTimer = setInterval(function(){
            if (i >= text.length) { clearInterval(typeTimer); if (caret) caret.remove(); return; }
            caret.insertAdjacentText('beforebegin', text.charAt(i));
            i++;
            bodyEl.scrollTop = bodyEl.scrollHeight;
          }, 18);
        }

        // Premium blur-lock: today's free reveal is spent, so show a heavily
        // blurred teaser (server withheld the real text) + a Stars unlock CTA.
        function showLocked(price){
          if (typeTimer) clearInterval(typeTimer);
          sheet.classList.add('locked');
          note.textContent = 'Перше розкриття на сьогодні — безкоштовне. Наступні — за Stars.';
          bodyEl.innerHTML =
            '<div class="why-lockwrap">' +
              '<div class="why-blur">Ваша глибинна сумісність за пʼятьма осями особистості вже прорахована — щирість, темп життя, спосіб прив\'язаності та ще кілька несподіваних збігів чекають на тебе…</div>' +
              '<div class="why-lockcta">' +
                '<div class="why-lockstar" aria-hidden="true">⭐️</div>' +
                '<button class="why-unlock" id="whyUnlock">Розблокувати за Stars · ' + price + ' ⭐</button>' +
              '</div>' +
            '</div>';
          overlay.querySelector('#whyUnlock').addEventListener('click', function(){
            if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
            sheet.classList.remove('locked');
            bodyEl.innerHTML = '<span class="caret"></span>';
            note.textContent = 'Розблокування…';
            requestReveal(true);
          });
        }

        // Not enough Stars to unlock → route to the Stars shop, then retry.
        function openShop(balance){
          if (window.SixtioPaywall) {
            window.SixtioPaywall.open({
              initData: initData, starsBalance: balance || 0,
              subtitle: 'Замало зірок, щоб розблокувати розкриття. Поповни баланс 💎',
              onSuccess: function(){ note.textContent = ''; requestReveal(true); }
            });
          } else {
            bodyEl.textContent = '';
            note.textContent = 'Недостатньо зірок (потрібно 10 ⭐). Запроси друзів, щоб отримати більше.';
          }
        }

        // confirmUnlock=false is a plain view (server decides free vs locked);
        // true is an explicit paid unlock the user just confirmed.
        function requestReveal(confirmUnlock){
          fetch('/api/chat', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData: initData, op: 'the_why_factor', matchId: mId, confirmUnlock: !!confirmUnlock })
          }).then(function(r){ return r.json(); }).then(function(res){
            if (res && res.ok && res.text) {
              if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(e){} }
              typeOut(res.text);
            } else if (res && res.reason === 'locked') {
              showLocked(res.price || 10);
            } else if (res && (res.reason === 'insufficient' || res.paywall)) {
              openShop(res.starsBalance || 0);
            } else {
              bodyEl.textContent = '';
              note.textContent = 'Не вдалося згенерувати. Спробуй ще раз.';
            }
          }).catch(function(){
            bodyEl.textContent = '';
            note.textContent = 'Не вдалося згенерувати. Спробуй ще раз.';
          });
        }

        requestReveal(false);
      }
    })();
  </script>
</body>
</html>
