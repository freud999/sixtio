<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — розмова</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js?v=35"></script>
<script src="theme.js?v=35"></script>
<link rel="stylesheet" href="theme.css?v=35" />
<style>
  body{ display:flex; flex-direction:column; overflow:hidden; }
  .chat-header, .messages, .composer{ position:relative; z-index:1; }

  /* header — glass bar; the peer area is tappable → match detail */
  .chat-header{ display:flex; align-items:center; gap:6px;
    padding:calc(env(safe-area-inset-top) + 12px) 12px 12px;
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(24px) saturate(1.5); backdrop-filter:blur(24px) saturate(1.5);
    border-bottom:1px solid var(--glass-border); }
  .back{ font-size:24px; color:var(--a1); background:none; border:none; cursor:pointer;
    padding:0 6px 0 2px; line-height:1; font-family:inherit; flex-shrink:0; }
  .peer{ display:flex; align-items:center; gap:12px; flex:1; min-width:0;
    background:none; border:none; padding:4px; border-radius:14px; cursor:pointer;
    font-family:inherit; color:var(--text); text-align:left; }
  .peer:active{ opacity:.8; }
  .peer-avatar{ width:42px; height:42px; border-radius:50%; object-fit:cover; flex-shrink:0;
    border:2px solid transparent; background:
      linear-gradient(var(--bg),var(--bg)) padding-box,
      linear-gradient(120deg, var(--a2), var(--a1)) border-box; }
  .peer-avatar-ph{ width:42px; height:42px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:20px; background:var(--faux-glass);
    border:1px solid var(--glass-border); color:var(--hint); flex-shrink:0; }
  .peer-name{ font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .peer-status{ font-size:11px; letter-spacing:.06em; color:var(--a1); }
  .info-ico{ flex-shrink:0; font-size:18px; color:var(--a1); opacity:.7; }

  /* telegram-exchange bar */
  .share-bar{ position:relative; z-index:1; display:flex; justify-content:center;
    padding:8px 14px 2px; }
  .share-btn{ display:inline-flex; align-items:center; gap:7px; max-width:100%;
    font-size:13px; font-weight:600; padding:9px 15px; border-radius:999px; cursor:pointer;
    font-family:inherit; border:1px solid var(--glass-border); background:var(--faux-glass);
    color:var(--a1); text-decoration:none; }
  .share-btn.wait{ color:var(--hint); cursor:default; }
  .share-btn.done{ color:#fff; border:none; background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 8px 22px -10px var(--glow); }
  .share-btn.done .txt{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* messages */
  .messages{ flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:3px;
    -webkit-overflow-scrolling:touch; }
  .intro{ align-self:center; text-align:center; max-width:82%; margin:auto 0; padding:22px;
    font-size:13px; line-height:1.6; color:var(--hint); }
  .intro .spark{ font-size:26px; display:block; margin-bottom:8px; }
  .msg{ max-width:80%; padding:11px 14px; border-radius:18px; font-size:15px; line-height:1.4;
    word-wrap:break-word; animation:pop .2s ease; }
  @keyframes pop{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }
  .msg.them{ align-self:flex-start; background:var(--faux-glass);
    border:1px solid var(--glass-border); color:var(--text); border-bottom-left-radius:5px; }
  .msg.me{ align-self:flex-end; color:#fff; border-bottom-right-radius:5px;
    background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 8px 22px -10px var(--glow); }

  /* Consecutive bubbles from the same sender within 2 min stack tight, and the
     inner (top) corner squares off so the group reads as one continuous block. */
  .msg:not(.grouped){ margin-top:9px; }
  .msg.me.grouped{ border-top-right-radius:6px; }
  .msg.them.grouped{ border-top-left-radius:6px; }

  /* composer — glass bar */
  .composer{ display:flex; gap:8px; align-items:flex-end;
    padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(24px) saturate(1.5); backdrop-filter:blur(24px) saturate(1.5);
    border-top:1px solid var(--glass-border); }
  .composer textarea{ flex:1; resize:none; max-height:110px; min-height:46px;
    border:1px solid var(--glass-border); border-radius:16px; padding:13px 15px; font-size:15px;
    font-family:inherit; color:var(--text); background:var(--faux-glass); outline:none; line-height:1.4; }
  .composer textarea::placeholder{ color:var(--hint); }
  .composer button{ flex-shrink:0; width:46px; height:46px; border:none; border-radius:50%;
    background:linear-gradient(120deg, var(--a2), var(--a1)); color:#fff; font-size:18px; cursor:pointer;
    box-shadow:0 8px 22px -8px var(--glow);
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s ease, opacity .12s ease; }
  .composer button:active{ transform:scale(0.94); opacity:.9; }
  .composer button:disabled{ opacity:.4; }
</style>
</head>
<body>
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="chat-header">
    <button class="back" id="back" data-i18n-aria="aria_back" aria-label="Назад">‹</button>
    <button class="peer" id="peer">
      <img class="peer-avatar" id="peerAvatar" alt="" hidden />
      <div class="peer-avatar-ph" id="peerAvatarPh">🙂</div>
      <div style="min-width:0;">
        <div class="peer-name" id="peerName" data-i18n="cv_title">Розмова</div>
        <div class="peer-status led" data-i18n="cv_view_match">переглянути метч ›</div>
      </div>
    </button>
    <span class="info-ico" aria-hidden="true">ⓘ</span>
  </div>

  <div class="share-bar" id="shareBar" hidden></div>

  <div class="messages" id="messages">
    <div class="intro glass" id="intro" hidden>
      <span class="spark">💜</span>
      <span data-i18n="cv_intro">Sixtio звела вас за справжньою сумісністю. Напиши перше повідомлення — з чогось теплого й щирого.</span>
    </div>
  </div>

  <form class="composer" id="composer">
    <textarea id="msgInput" rows="1" data-i18n-ph="cv_msg_ph" placeholder="Повідомлення..."></textarea>
    <button type="submit" id="sendBtn" data-i18n-aria="ob_send_aria" aria-label="Надіслати">➤</button>
  </form>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
        if (tg.BackButton) {
          try { tg.BackButton.show(); tg.BackButton.onClick(goBack); } catch(e){}
        }
      }

      var messagesEl = document.getElementById('messages');
      var intro = document.getElementById('intro');
      var composer = document.getElementById('composer');
      var input = document.getElementById('msgInput');
      var sendBtn = document.getElementById('sendBtn');

      var initData = (tg && tg.initData) || '';
      var seen = {};       // message id -> true (dedupe across polls)
      var pollTimer = null;
      var matchId = new URLSearchParams(window.location.search).get('match') || null;

      function goBack(){ window.location.href = 'chat.html'; }
      document.getElementById('back').addEventListener('click', goBack);
      document.getElementById('peer').addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }
        window.location.href = 'match.html' + (matchId ? '?match=' + encodeURIComponent(matchId) : '');
      });

      function api(path, payload){
        var body = Object.assign({ initData: initData }, payload);
        if (matchId) body.matchId = matchId;
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(function(r){
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      }

      function scrollToBottom(){
        requestAnimationFrame(function(){ messagesEl.scrollTop = messagesEl.scrollHeight; });
      }

      var lastMine = null;   // was the previous rendered bubble mine?
      var lastTime = 0;      // …and when (ms) — for the <2min stacking rule
      function addMessage(m){
        if (seen[m.id]) return;
        seen[m.id] = true;
        intro.hidden = true;
        var t = m.createdAt ? new Date(m.createdAt).getTime() : Date.now();
        // Same sender as the previous bubble AND within 2 minutes → stack it.
        var grouped = (lastMine === m.mine) && (t - lastTime) < 120000;
        var el = document.createElement('div');
        el.className = 'msg ' + (m.mine ? 'me' : 'them') + (grouped ? ' grouped' : '');
        el.textContent = m.text;
        messagesEl.appendChild(el);
        lastMine = m.mine;
        lastTime = t;
        scrollToBottom();
      }

      function renderPartner(partner){
        if (!partner) return;
        document.getElementById('peerName').textContent = partner.name || SixtioI18n.t('cv_title');
        if (partner.photoUrl) {
          var av = document.getElementById('peerAvatar');
          av.src = partner.photoUrl;
          av.hidden = false;
          document.getElementById('peerAvatarPh').hidden = true;
        }
      }

      // ---- Telegram exchange (mutual consent) --------------------------------
      var shareBar = document.getElementById('shareBar');
      var peerName = SixtioI18n.t('cv_pair');

      function renderShare(state){
        shareBar.hidden = false;
        shareBar.innerHTML = '';
        if (state.shareBoth) {
          var a = document.createElement('a');
          a.className = 'share-btn done';
          if (state.partnerUsername) {
            a.href = 'https://t.me/' + state.partnerUsername;
            a.target = '_blank'; a.rel = 'noopener';
            a.innerHTML = '<span>✈️</span><span class="txt"></span>';
            a.querySelector('.txt').textContent = SixtioI18n.t('cv_open_tg', { u: state.partnerUsername });
          } else {
            a.className = 'share-btn wait';
            a.textContent = SixtioI18n.t('cv_no_username');
          }
          shareBar.appendChild(a);
        } else if (state.shareMine) {
          var w = document.createElement('span');
          w.className = 'share-btn wait';
          w.textContent = SixtioI18n.t('cv_waiting', { name: peerName });
          shareBar.appendChild(w);
        } else {
          var b = document.createElement('button');
          b.className = 'share-btn';
          b.innerHTML = '<span>🔗</span><span></span>';
          b.querySelector('span:last-child').textContent = SixtioI18n.t('cv_share_btn');
          b.addEventListener('click', function(){
            if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
            b.disabled = true;
            api('/api/chat', { op: 'share', action: 'consent' })
              .then(renderShare)
              .catch(function(){ b.disabled = false; });
          });
          shareBar.appendChild(b);
        }
      }

      function loadShare(){
        api('/api/chat', { op: 'share', action: 'state' }).then(renderShare).catch(function(){});
      }

      var partnerLoaded = false;
      function load(){
        api('/api/chat', { op: 'list' }).then(function(data){
          if (!data.hasMatch) { goBack(); return; }
          if (data.matchId) matchId = data.matchId;
          if (!partnerLoaded) {
            renderPartner(data.partner);
            peerName = (data.partner && data.partner.name) || SixtioI18n.t('cv_pair');
            partnerLoaded = true;
            loadShare();
          }
          var had = Object.keys(seen).length;
          data.messages.forEach(addMessage);
          if (had === 0 && data.messages.length === 0) intro.hidden = false;
        }).catch(function(){ /* keep last state on transient errors */ });
      }

      function autosize(){
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 110) + 'px';
      }
      input.addEventListener('input', autosize);

      composer.addEventListener('submit', function(e){
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;
        input.value = '';
        autosize();
        sendBtn.disabled = true;
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(err){} }
        api('/api/chat', { op: 'send', text: text }).then(function(resp){
          if (resp && resp.message) addMessage(resp.message);
        }).catch(function(){
          input.value = text; autosize();
        }).then(function(){ sendBtn.disabled = false; input.focus(); });
      });

      input.addEventListener('keydown', function(e){
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          composer.requestSubmit ? composer.requestSubmit() : composer.dispatchEvent(new Event('submit', { cancelable:true }));
        }
      });

      load();
      pollTimer = setInterval(load, 4000);
      document.addEventListener('visibilitychange', function(){
        if (document.hidden) { clearInterval(pollTimer); }
        else { load(); pollTimer = setInterval(load, 4000); }
      });
    })();
  </script>
</body>
</html>
