<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — мій профіль</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #16151c);
    --hint: var(--tg-theme-hint-color, #8b8a94);
    --card: var(--tg-theme-secondary-bg-color, #f4f3f8);
    --violet: #7F77DD;
    --violet-deep: #534AB7;
    --teal: #1D9E75;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  [hidden]{ display:none !important; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100dvh;
    padding:calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 12px);
    overflow-y:auto; gap:16px;
  }

  /* searching banner */
  .search-banner{ display:flex; align-items:center; gap:12px; width:100%; max-width:440px;
    padding:12px 16px; border-radius:14px; background:var(--card); }
  .pulse{ position:relative; width:14px; height:14px; flex-shrink:0; }
  .pulse::before, .pulse::after{ content:''; position:absolute; inset:0; border-radius:50%;
    background:linear-gradient(90deg,var(--violet),var(--teal)); }
  .pulse::after{ animation:pulse 1.8s ease-out infinite; }
  @keyframes pulse{ from{ transform:scale(1); opacity:.7; } to{ transform:scale(2.6); opacity:0; } }
  .search-banner .txt{ font-size:13px; line-height:1.45; color:var(--hint); }
  .search-banner .txt b{ color:var(--text); font-weight:600; }

  /* profile head */
  .profile-head{ display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .avatar{ width:120px; height:120px; border-radius:50%; object-fit:cover;
    border:3px solid transparent; background:
      linear-gradient(var(--bg),var(--bg)) padding-box,
      linear-gradient(120deg,var(--violet-deep),var(--teal)) border-box; }
  .avatar-placeholder{ width:120px; height:120px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:42px; background:var(--card); color:var(--hint); }
  .name-age{ font-size:21px; font-weight:600; letter-spacing:-0.3px; }
  .meta{ font-size:14px; color:var(--hint); }
  .goal-badge{ display:inline-block; font-size:13px; font-weight:500; padding:6px 14px;
    border-radius:999px; color:#fff; background:linear-gradient(90deg,var(--violet-deep),var(--teal)); }

  /* sections */
  .section{ width:100%; max-width:440px; padding:16px 18px; border-radius:16px; background:var(--card); }
  .section .sec-title{ font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.6px;
    color:var(--hint); margin-bottom:10px; }
  .section .sec-body{ font-size:14px; line-height:1.55; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ font-size:13px; font-weight:500; padding:6px 12px; border-radius:999px;
    color:#fff; background:var(--violet-deep); }
  .chip:nth-child(even){ background:var(--teal); }
  .chip.outline{ background:transparent; border:1.5px solid var(--violet-deep); color:var(--violet-deep); }
  .chip.outline:nth-child(even){ border-color:var(--teal); color:var(--teal); }
  .sec-title.grad{
    background:linear-gradient(90deg,var(--violet-deep),var(--teal));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  .note{ text-align:center; font-size:12px; color:var(--hint); padding-top:4px; }
</style>
</head>
<body>
  <div class="search-banner">
    <div class="pulse" aria-hidden="true"></div>
    <div class="txt"><b>Sixtio шукає твою пару.</b> Можна закривати додаток — щойно буде метч, бот напише тобі.</div>
  </div>

  <div class="profile-head">
    <img class="avatar" id="avatar" alt="Фото профілю" hidden />
    <div class="avatar-placeholder" id="avatarPlaceholder">🙂</div>
    <div class="name-age" id="nameAge"></div>
    <div class="meta" id="meta"></div>
    <span class="goal-badge" id="goalBadge" hidden></span>
  </div>

  <div class="section" id="bioSection" hidden>
    <div class="sec-title">Про мене</div>
    <div class="sec-body" id="bio"></div>
  </div>

  <div class="section" id="interestsSection" hidden>
    <div class="sec-title">Інтереси</div>
    <div class="chips" id="interests"></div>
  </div>

  <div class="section" id="traitsSection" hidden>
    <div class="sec-title grad">Як Sixtio тебе зрозуміла</div>
    <div class="chips" id="traits" style="margin-bottom:12px;"></div>
    <div class="sec-body" id="summary"></div>
  </div>

  <p class="note">Що щиріші відповіді — то точніший метч 💜</p>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('secondary_bg_color'); } catch(e){}
      }

      var GOALS = {
        longterm: 'Шукаю довготривалі стосунки',
        fun: 'Хочу розважитись',
        situational: 'Відкритий(-а) — по ситуації'
      };

      function fillChips(containerId, items, outline){
        var wrap = document.getElementById(containerId);
        wrap.innerHTML = '';
        (items || []).forEach(function(item){
          var chip = document.createElement('span');
          chip.className = 'chip' + (outline ? ' outline' : '');
          chip.textContent = item;
          wrap.appendChild(chip);
        });
        return (items || []).length > 0;
      }

      function render(me){
        var u = me.user || {};
        var p = me.profile;

        if (u.photoUrl) {
          var avatar = document.getElementById('avatar');
          avatar.src = u.photoUrl;
          avatar.hidden = false;
          document.getElementById('avatarPlaceholder').hidden = true;
        }

        var tgName = tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name;
        var name = tgName || (u.name || '').split(' ')[0] || '';
        document.getElementById('nameAge').textContent = name + (u.age ? (name ? ', ' : '') + u.age : '');
        document.getElementById('meta').textContent = u.city ? '📍 ' + u.city : '';

        if (u.goal && GOALS[u.goal]) {
          var badge = document.getElementById('goalBadge');
          badge.textContent = GOALS[u.goal];
          badge.hidden = false;
        }

        if (u.bio) {
          document.getElementById('bio').textContent = u.bio;
          document.getElementById('bioSection').hidden = false;
        }
        if (fillChips('interests', u.interests, true)) {
          document.getElementById('interestsSection').hidden = false;
        }
        if (p && p.traits && p.traits.length) {
          fillChips('traits', p.traits, false);
          document.getElementById('summary').textContent = p.summary || '';
          document.getElementById('traitsSection').hidden = false;
        }
      }

      // Offline-first: cached psych profile shows even before the API answers.
      try {
        var cached = JSON.parse(localStorage.getItem('sixtio_profile') || 'null');
        if (cached) render({ user: {}, profile: cached });
      } catch(e){}

      fetch('/api/me', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: (tg && tg.initData) || '' })
      }).then(function(r){
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }).then(function(me){
        if (!me.registered) {
          window.location.replace('onboarding.html');
          return;
        }
        if (me.profile) localStorage.setItem('sixtio_profile', JSON.stringify(me.profile));
        render(me);
      }).catch(function(){ /* offline — cached data is already shown */ });
    })();
  </script>
</body>
</html>
