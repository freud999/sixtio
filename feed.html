<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — знайти пару</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js?v=31"></script>
<script src="theme.js?v=31"></script>
<script src="paywall.js?v=31"></script>
<link rel="stylesheet" href="theme.css?v=31" />
<style>
  body{
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 14px) 14px 12px;
    gap:12px; overflow:hidden;
  }
  body > *{ position:relative; z-index:1; }
  .bg-dots, .bg-aura{ z-index:0; }

  /* ---- swipe deck ---- */
  .deck{ position:relative; width:100%; max-width:420px; flex:1; min-height:0; }
  .card{
    position:absolute; inset:0; border-radius:26px; overflow:hidden;
    background:var(--card); box-shadow:var(--glass-shadow);
    will-change:transform; touch-action:none; cursor:grab; user-select:none;
  }
  .card.is-front{ cursor:grab; }
  .card-img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  /* Premium gate: non-premium users see candidates through frosted glass. */
  .card-img.blurred{ filter:blur(8px); transform:scale(1.06); }
  .card-ph{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:74px; background:linear-gradient(150deg, var(--a2), var(--a1)); color:#fff; }
  .scrim{ position:absolute; left:0; right:0; bottom:0; height:62%;
    background:linear-gradient(to top, rgba(8,6,20,.86) 6%, rgba(8,6,20,.4) 46%, transparent 100%); }

  .lock{ position:absolute; top:14px; left:14px; display:flex; align-items:center; gap:6px;
    font-size:12px; font-weight:700; color:#fff; padding:6px 11px; border-radius:999px;
    background:rgba(10,8,24,.5); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.25); }

  .card-info{ position:absolute; left:0; right:0; bottom:0; padding:18px 18px 20px; color:#fff; }
  .card-head{ display:flex; align-items:center; gap:10px; }
  .card-name{ font-size:24px; font-weight:800; letter-spacing:.01em;
    text-shadow:0 2px 12px rgba(0,0,0,.5); }
  .card-pct{ flex-shrink:0; font-size:13px; font-weight:800; color:#fff;
    padding:4px 11px; border-radius:999px;
    background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 4px 14px -4px var(--glow); }
  .card-city{ font-size:14px; margin-top:5px; opacity:.92; text-shadow:0 1px 8px rgba(0,0,0,.5); }
  .card-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .card-tag{ font-size:12px; font-weight:600; padding:6px 11px; border-radius:999px; color:#fff;
    background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.28);
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }

  /* ---- Dark Mode (18+) intimate compatibility ---- */
  .card-dark{ margin-top:10px; padding:10px 12px; border-radius:16px;
    background:linear-gradient(120deg, rgba(255,86,64,.22), rgba(190,40,120,.28));
    border:1px solid rgba(255,120,90,.45);
    box-shadow:0 6px 20px -8px rgba(255,70,60,.6); }
  .dark-score{ font-size:13.5px; font-weight:700; color:#fff; letter-spacing:.01em;
    text-shadow:0 1px 8px rgba(0,0,0,.45); animation:flameGlow 2.4s ease-in-out infinite; }
  .dark-score b{ font-weight:900; }
  @keyframes flameGlow{ 0%,100%{ text-shadow:0 1px 8px rgba(255,90,60,.5); }
    50%{ text-shadow:0 1px 16px rgba(255,140,80,.95); } }
  .dark-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .dark-tags.blurred{ filter:blur(5px); opacity:.85; pointer-events:none; }
  .dark-tag{ font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:999px; color:#fff;
    background:rgba(255,120,90,.28); border:1px solid rgba(255,150,110,.5);
    animation:tagPulse 1.9s ease-in-out infinite; }
  @keyframes tagPulse{ 0%,100%{ transform:scale(1); opacity:.9; }
    50%{ transform:scale(1.045); opacity:1; } }
  .dark-hint{ font-size:11.5px; font-weight:600; color:#ffd9cf; margin-top:8px; }

  /* drag verdict stamps */
  .badge{ position:absolute; top:26px; font-size:26px; font-weight:900; letter-spacing:.08em;
    padding:7px 14px; border-radius:12px; opacity:0; pointer-events:none; }
  .badge.like{ right:20px; color:#1fbf7a; border:3px solid #1fbf7a; transform:rotate(14deg); }
  .badge.nope{ left:20px; color:#ff4d6d; border:3px solid #ff4d6d; transform:rotate(-14deg); }

  /* ---- action buttons ---- */
  .actions{ display:flex; align-items:center; justify-content:center; gap:26px;
    width:100%; max-width:420px; padding:2px 0 2px; }
  .act{ width:64px; height:64px; border-radius:50%; border:none; cursor:pointer; font-size:26px;
    display:flex; align-items:center; justify-content:center; font-family:inherit;
    background:var(--glass-grad); border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-hi);
    -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px);
    transition:transform .14s ease; }
  .act:active{ transform:scale(.9); }
  .act.nope{ color:#ff4d6d; }
  .act.like{ width:74px; height:74px; font-size:32px; color:#fff;
    background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 12px 30px -10px var(--glow), inset 0 1px 0 rgba(255,255,255,.35); }

  /* ---- 🔥 Daily Mystery Match ---- */
  .mystery{ width:100%; max-width:420px; border-radius:22px; padding:14px 16px;
    display:flex; align-items:center; gap:14px; cursor:default;
    background:linear-gradient(125deg, rgba(120,40,200,.42), rgba(210,40,130,.38));
    border:1px solid rgba(200,130,255,.5);
    box-shadow:0 10px 34px -12px rgba(180,60,220,.8), inset 0 1px 0 rgba(255,255,255,.18);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    animation:mysteryGlow 3s ease-in-out infinite; }
  @keyframes mysteryGlow{ 0%,100%{ box-shadow:0 10px 34px -14px rgba(180,60,220,.7), inset 0 1px 0 rgba(255,255,255,.18); }
    50%{ box-shadow:0 14px 42px -10px rgba(230,80,200,.95), inset 0 1px 0 rgba(255,255,255,.25); } }
  .mystery-orb{ flex-shrink:0; width:66px; height:66px; border-radius:20px;
    display:flex; align-items:center; justify-content:center; font-size:34px; font-weight:900; color:#fff;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.35), rgba(150,40,220,.65));
    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 0 24px -2px rgba(220,90,255,.9), inset 0 0 18px rgba(255,255,255,.25);
    overflow:hidden; }
  .mystery-orb .q{ animation:orbFloat 2.6s ease-in-out infinite; }
  @keyframes orbFloat{ 0%,100%{ transform:scale(1); text-shadow:0 0 12px rgba(255,255,255,.8); }
    50%{ transform:scale(1.14); text-shadow:0 0 22px rgba(255,255,255,1); } }
  .mystery-orb img{ width:100%; height:100%; object-fit:cover; }
  .mystery-body{ flex:1; min-width:0; }
  .mystery-title{ font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    color:#ffd6f4; }
  .mystery-pct{ font-size:20px; font-weight:900; color:#fff; margin-top:2px;
    text-shadow:0 2px 12px rgba(0,0,0,.35); }
  .mystery-pct b{ background:linear-gradient(120deg,#ffe08a,#ff7ad9);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .mystery-name{ font-size:15px; font-weight:800; color:#fff; margin-top:2px; }
  .mystery-btn{ margin-top:8px; width:100%; border:none; cursor:pointer; font-family:inherit;
    font-size:13.5px; font-weight:800; color:#fff; padding:9px 12px; border-radius:12px;
    background:linear-gradient(120deg,#a23bff,#ff4db8);
    box-shadow:0 8px 20px -8px rgba(220,70,200,.9); transition:transform .14s ease; }
  .mystery-btn:active{ transform:scale(.96); }
  .mystery-btn:disabled{ opacity:.6; cursor:default; }

  /* ---- 🎁 Lootbox modal ("Скриньки Удачі") ---- */
  .loot-back{ position:fixed; inset:0; z-index:50; display:flex; align-items:flex-end;
    justify-content:center; background:rgba(6,4,16,.66);
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
    opacity:0; pointer-events:none; transition:opacity .28s ease; }
  .loot-back.show{ opacity:1; pointer-events:auto; }
  .loot-sheet{ width:100%; max-width:440px; border-radius:26px 26px 0 0; padding:22px 18px calc(22px + env(safe-area-inset-bottom));
    background:var(--card); border:1px solid var(--glass-border); box-shadow:var(--glass-shadow);
    transform:translateY(102%); transition:transform .34s cubic-bezier(.22,1,.36,1); }
  .loot-back.show .loot-sheet{ transform:translateY(0); }
  .loot-h{ text-align:center; }
  .loot-h .t{ font-size:19px; font-weight:900; letter-spacing:.01em;
    background:linear-gradient(120deg,#a23bff,#ff4db8); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .loot-h .s{ font-size:13px; color:var(--hint); margin-top:5px; line-height:1.5; }
  .loot-boxes{ display:flex; justify-content:center; gap:14px; margin:22px 0 6px; }
  .loot-box{ width:88px; height:88px; border-radius:20px; cursor:pointer; font-size:40px;
    display:flex; align-items:center; justify-content:center; font-family:inherit; color:#fff;
    background:linear-gradient(140deg, rgba(150,50,220,.5), rgba(220,50,140,.5));
    border:1px solid rgba(210,140,255,.55);
    box-shadow:0 8px 24px -8px rgba(190,70,230,.8), inset 0 1px 0 rgba(255,255,255,.25);
    animation:lootIdle 2.2s ease-in-out infinite; transition:transform .2s ease; }
  .loot-box:active{ transform:scale(.93); }
  @keyframes lootIdle{ 0%,100%{ transform:translateY(0) rotate(-2deg); }
    50%{ transform:translateY(-6px) rotate(2deg); } }
  .loot-box.opening{ animation:lootPop .5s ease forwards; }
  @keyframes lootPop{ 0%{ transform:scale(1) rotate(0); } 40%{ transform:scale(1.28) rotate(8deg); }
    100%{ transform:scale(1) rotate(0); } }
  .loot-box.opened{ animation:none; cursor:default; opacity:.55;
    background:linear-gradient(140deg, rgba(90,70,130,.4), rgba(120,70,110,.4)); box-shadow:none; }
  .loot-box.win{ opacity:1; border-color:rgba(255,220,130,.85);
    box-shadow:0 0 26px -2px rgba(255,210,110,.95); background:linear-gradient(140deg, rgba(255,180,60,.5), rgba(255,90,170,.5)); }
  .loot-result{ text-align:center; min-height:26px; margin-top:6px; font-size:15px; font-weight:800; color:#fff; }
  .loot-result.win{ animation:resultPop .4s ease; }
  @keyframes resultPop{ 0%{ transform:scale(.7); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  .loot-actions{ margin-top:16px; display:flex; flex-direction:column; gap:9px; }
  .loot-cost{ text-align:center; font-size:12.5px; color:var(--hint); }
  .loot-premium{ width:100%; border:none; cursor:pointer; font-family:inherit; font-size:13.5px;
    font-weight:800; color:#fff; padding:12px; border-radius:14px;
    background:linear-gradient(120deg, var(--a2), var(--a1)); box-shadow:0 8px 22px -8px var(--glow); }
  .loot-close{ width:100%; background:none; border:none; cursor:pointer; font-family:inherit;
    font-size:13px; font-weight:700; color:var(--hint); padding:8px; }

  /* empty / loading */
  .state{ display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:10px; height:100%; padding:24px; color:var(--hint); }
  .state .emo{ font-size:44px; }
  .state .txt{ font-size:14px; line-height:1.6; max-width:300px; }
  .state .txt b{ color:var(--text); }
  .spin{ display:inline-block; width:22px; height:22px; border-radius:50%;
    border:2.5px solid var(--glass-border); border-top-color:var(--a1); animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body class="has-tab-bar">
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="mystery" id="mysteryCard" hidden>
    <div class="mystery-orb" id="mysteryOrb"><span class="q">?</span></div>
    <div class="mystery-body">
      <div class="mystery-title" data-i18n="mystery_title">🔥 Таємний метч дня</div>
      <div class="mystery-pct" id="mysteryPct" data-i18n="mystery_pct_ph">— % сумісності</div>
      <div class="mystery-name" id="mysteryName" hidden></div>
      <button class="mystery-btn" id="mysteryBtn" data-i18n="mystery_unlock">🔓 Розблокувати особу · 10 ⭐</button>
    </div>
  </div>

  <div class="deck" id="deck">
    <div class="state" id="loadingState"><span class="spin"></span></div>
  </div>

  <div class="actions" id="actions" hidden>
    <button class="act nope" id="nopeBtn" data-i18n-aria="act_skip" aria-label="Пропустити">✕</button>
    <button class="act like" id="likeBtn" data-i18n-aria="act_like" aria-label="Подобається">💜</button>
  </div>

  <div class="loot-back" id="lootBack">
    <div class="loot-sheet">
      <div class="loot-h">
        <div class="t" data-i18n="loot_title">🎁 Скриньки Удачі</div>
        <div class="s" id="lootSub" data-i18n="loot_sub">Ліміт свайпів вичерпано. Спробуй удачу — перша скринька безкоштовна!</div>
      </div>
      <div class="loot-boxes" id="lootBoxes">
        <button class="loot-box" data-i="0">🎁</button>
        <button class="loot-box" data-i="1">🎁</button>
        <button class="loot-box" data-i="2">🎁</button>
      </div>
      <div class="loot-result" id="lootResult"></div>
      <div class="loot-actions">
        <div class="loot-cost" id="lootCost" data-i18n="loot_first_free">Перша скринька — безкоштовно</div>
        <button class="loot-premium" id="lootPremium" data-i18n="loot_premium">💎 Або Premium — безлімітні свайпи</button>
        <button class="loot-close" id="lootClose" data-i18n="close">Закрити</button>
      </div>
    </div>
  </div>

  <nav class="tab-bar">
    <a class="tab-item active" href="matches.html"><span class="ico">💜</span><span data-i18n="tab_matches">Метчі</span></a>
    <a class="tab-item" href="chat.html"><span class="ico">💬</span><span data-i18n="tab_chat">Чат</span></a>
    <a class="tab-item" href="profile.html"><span class="ico">👤</span><span data-i18n="tab_profile">Профіль</span></a>
  </nav>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
      }
      var initData = (tg && tg.initData) || '';
      // Localized UI copy + kink-marker labels (uk/en/ru) — Task 26.
      var t = SixtioI18n.t, kinkLabel = SixtioI18n.kink;

      // Gender tint from the cached profile (feed doesn't carry it).
      try {
        var cachedMe = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
        if (cachedMe && cachedMe.user && cachedMe.user.gender && window.SixtioTheme) {
          window.SixtioTheme.setGender(cachedMe.user.gender);
        }
      } catch(e){}

      var deckEl = document.getElementById('deck');
      var actionsEl = document.getElementById('actions');
      var loadingState = document.getElementById('loadingState');

      var deck = [];             // candidates fetched, not yet swiped
      var loadedIds = {};        // dedupe across pages
      var offset = 0, hasMore = true, loading = false, premium = false, busy = false;
      // null = unlimited (female / premium male); a number = free male's remaining
      // right-swipes this rolling 24h. Dislikes never touch it.
      var likesLeft = null, paywallOpen = false;

      function haptic(kind){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred(kind); } catch(e){} }
      }
      function api(path, payload){
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.assign({ initData: initData }, payload))
        }).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
      }

      function buildCard(c){
        var el = document.createElement('div');
        el.className = 'card faux-glass';

        if (c.photoUrl) {
          var img = document.createElement('img');
          img.className = 'card-img' + (premium ? '' : ' blurred');
          img.src = c.photoUrl; img.alt = ''; img.draggable = false;
          el.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.className = 'card-ph'; ph.textContent = '🙂';
          el.appendChild(ph);
        }

        var scrim = document.createElement('div'); scrim.className = 'scrim';
        el.appendChild(scrim);

        if (!premium && c.photoUrl) {
          var lock = document.createElement('div');
          lock.className = 'lock'; lock.textContent = t('lock_premium');
          el.appendChild(lock);
        }

        var like = document.createElement('div'); like.className = 'badge like'; like.textContent = 'LIKE';
        var nope = document.createElement('div'); nope.className = 'badge nope'; nope.textContent = 'NOPE';
        el.appendChild(like); el.appendChild(nope);

        var info = document.createElement('div'); info.className = 'card-info';
        var head = document.createElement('div'); head.className = 'card-head';
        var nm = document.createElement('div'); nm.className = 'card-name';
        nm.textContent = c.name + (c.age ? ', ' + c.age : '');
        head.appendChild(nm);
        var pct = document.createElement('div'); pct.className = 'card-pct';
        pct.textContent = (c.compatibility || 0) + '%';
        head.appendChild(pct);
        info.appendChild(head);

        // Dark Mode (18+): second, glowing flame scale — only present when both
        // this user and the candidate opted in (server gates it in api/feed.js).
        if (c.darkMode) {
          var dm = document.createElement('div'); dm.className = 'card-dark';
          var ds = document.createElement('div'); ds.className = 'dark-score';
          ds.innerHTML = t('intimate_score') + ' <b>' + (c.intimateCompatibility || 0) + '%</b>';
          dm.appendChild(ds);
          // Premium males & females get the real matching tags. Free males get
          // an empty array (withheld server-side) + the locked upsell nudge.
          if (c.intimateTags && c.intimateTags.length) {
            var dt = document.createElement('div'); dt.className = 'dark-tags';
            c.intimateTags.slice(0, 4).forEach(function(tag){
              var chip = document.createElement('span'); chip.className = 'dark-tag';
              chip.textContent = kinkLabel(tag);
              dt.appendChild(chip);
            });
            dm.appendChild(dt);
          } else if (c.intimateTagsBlurred) {
            var dh = document.createElement('div'); dh.className = 'dark-hint';
            dh.textContent = t('dark_hint');
            dm.appendChild(dh);
          }
          info.appendChild(dm);
        }

        if (c.city) {
          var city = document.createElement('div'); city.className = 'card-city';
          city.textContent = '📍 ' + c.city;
          info.appendChild(city);
        }
        if (c.tags && c.tags.length) {
          var tags = document.createElement('div'); tags.className = 'card-tags';
          c.tags.slice(0, 3).forEach(function(t){
            var chip = document.createElement('div'); chip.className = 'card-tag'; chip.textContent = t;
            tags.appendChild(chip);
          });
          info.appendChild(tags);
        }
        el.appendChild(info);
        return el;
      }

      function showEmpty(){
        deckEl.innerHTML =
          '<div class="state"><div class="emo">💜</div>' +
          '<div class="txt">' + t('feed_empty') + '</div></div>';
        actionsEl.hidden = true;
      }

      function render(){
        if (!deck.length) {
          if (loading) { return; }        // spinner already up
          if (!hasMore) { showEmpty(); }
          return;
        }
        deckEl.innerHTML = '';
        actionsEl.hidden = false;
        var top2 = deck.slice(0, 2);
        for (var i = top2.length - 1; i >= 0; i--) {   // back first, front painted last
          var el = buildCard(top2[i]);
          el.style.zIndex = String(10 - i);
          if (i === 0) { el.classList.add('is-front'); attachDrag(el, top2[i]); }
          else { el.style.transform = 'scale(.955) translateY(10px)'; }
          deckEl.appendChild(el);
        }
      }

      function fly(el, dir){
        el.style.transition = 'transform .32s ease, opacity .32s ease';
        el.style.transform = 'translate(' + (dir * 620) + 'px, 46px) rotate(' + (dir * 26) + 'deg)';
        el.style.opacity = '0';
      }

      function starsBalance(){
        try {
          var me = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
          return (me && me.user && me.user.starsBalance) || 0;
        } catch(e){ return 0; }
      }

      function openPaywall(){
        if (paywallOpen || !window.SixtioPaywall) return;
        paywallOpen = true;
        window.SixtioPaywall.open({
          initData: initData,
          starsBalance: starsBalance(),
          onSuccess: function(res){
            paywallOpen = false;
            premium = !!res.premium;
            // null after Premium (unlimited); 30 after a top-up pack.
            likesLeft = (typeof res.likesLeft === 'number') ? res.likesLeft : null;
            render();   // repaint: Premium drops the blur immediately
          }
        });
        // Re-arm if the user just closes the sheet without buying.
        setTimeout(function(){ paywallOpen = false; }, 400);
      }

      // Free males must have a like left; entitled users (null) always pass.
      function canLike(){
        if (premium || likesLeft === null) return true;
        if (likesLeft <= 0){ haptic('rigid'); openLootboxModal(); return false; }
        return true;
      }

      function commit(cand, action){
        if (cand.__done) return;
        cand.__done = true;
        busy = true;
        haptic('medium');
        if (action === 'like' && likesLeft !== null && likesLeft > 0) likesLeft--;
        api('/api/interact', { op: 'swipe', targetId: cand.userId, action: action }).then(function(res){
          // Authoritative backstop: server refused the like (race on the cap).
          if (res && res.paywall) openLootboxModal();
        }).catch(function(){});
        setTimeout(function(){
          deck.shift();
          busy = false;
          render();
          maybeLoadMore();
        }, 300);
      }

      function attachDrag(el, cand){
        var startX = 0, startY = 0, dx = 0, dy = 0, dragging = false;
        var like = el.querySelector('.badge.like'), nope = el.querySelector('.badge.nope');
        el.addEventListener('pointerdown', function(e){
          if (busy) return;
          dragging = true; startX = e.clientX; startY = e.clientY;
          el.style.transition = 'none';
          try { el.setPointerCapture(e.pointerId); } catch(err){}
        });
        el.addEventListener('pointermove', function(e){
          if (!dragging) return;
          dx = e.clientX - startX; dy = e.clientY - startY;
          el.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (dx / 18) + 'deg)';
          if (like) like.style.opacity = dx > 0 ? Math.min(1, dx / 90) : 0;
          if (nope) nope.style.opacity = dx < 0 ? Math.min(1, -dx / 90) : 0;
        });
        function end(){
          if (!dragging) return; dragging = false;
          // Right-swipe past threshold, but out of free likes -> snap back + paywall.
          if (dx > 110 && !canLike()) { dx = 0; dy = 0; snapBack(); return; }
          if (dx > 110) { fly(el, 1); commit(cand, 'like'); }
          else if (dx < -110) { fly(el, -1); commit(cand, 'dislike'); }
          else { snapBack(); }
          dx = 0; dy = 0;
        }
        function snapBack(){
          el.style.transition = 'transform .25s ease';
          el.style.transform = '';
          if (like) like.style.opacity = 0;
          if (nope) nope.style.opacity = 0;
        }
        el.addEventListener('pointerup', end);
        el.addEventListener('pointercancel', end);
      }

      function swipeTop(action){
        if (busy || !deck.length) return;
        if (action === 'like' && !canLike()) return;   // paywall shown by canLike
        var front = deckEl.querySelector('.is-front');
        if (!front) return;
        var badge = front.querySelector(action === 'like' ? '.badge.like' : '.badge.nope');
        if (badge) badge.style.opacity = 1;
        fly(front, action === 'like' ? 1 : -1);
        commit(deck[0], action);
      }

      document.getElementById('likeBtn').addEventListener('click', function(){ swipeTop('like'); });
      document.getElementById('nopeBtn').addEventListener('click', function(){ swipeTop('dislike'); });

      function maybeLoadMore(){
        if (deck.length <= 3 && hasMore && !loading) loadMore();
      }

      function loadMore(){
        if (loading) return Promise.resolve();
        loading = true;
        var reqOffset = offset;   // remember which page this call fetched
        return api('/api/feed', { offset: offset, limit: 20 }).then(function(res){
          if (!res.registered) { window.location.replace('onboarding.html'); return; }
          premium = !!res.premium;
          likesLeft = (typeof res.likesLeft === 'number') ? res.likesLeft : null;
          // Mystery Match rides only on the first page's payload.
          if (reqOffset === 0) renderMystery(res.mysteryMatch);
          // Male out of likes on load — pop the luck boxes before they even drag.
          if (res.rateLimited) openLootboxModal();
          var got = res.candidates || [];
          offset += got.length;
          got.forEach(function(c){
            if (loadedIds[c.userId]) return;   // never queue the same person twice
            loadedIds[c.userId] = true;
            deck.push(c);
          });
          hasMore = !!res.hasMore;
          loading = false;
          render();
        }).catch(function(){
          loading = false;
          if (!deck.length) {
            deckEl.innerHTML =
              '<div class="state"><div class="emo">📡</div>' +
              '<div class="txt">' + t('feed_net_error') + '</div></div>';
          }
        });
      }

      // ---- 🔥 Daily Mystery Match ----------------------------------------
      var mystery = null, mysteryBusy = false, lootOpen = false, lootBusy = false;
      var mysteryCard = document.getElementById('mysteryCard');
      var mysteryOrb  = document.getElementById('mysteryOrb');
      var mysteryPct  = document.getElementById('mysteryPct');
      var mysteryName = document.getElementById('mysteryName');
      var mysteryBtn  = document.getElementById('mysteryBtn');

      // Keep the cached wallet in sync so every screen reads the fresh balance.
      function persistStars(bal){
        try {
          var me = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
          if (me && me.user) { me.user.starsBalance = bal; localStorage.setItem('sixtio_me', JSON.stringify(me)); }
        } catch(e){}
      }

      function renderMystery(m){
        mystery = m || null;
        if (!mystery) { mysteryCard.hidden = true; return; }
        mysteryCard.hidden = false;
        var pct = t('mystery_pct', { pct: (mystery.compatibility == null ? '—' : mystery.compatibility) });
        mysteryPct.innerHTML = '<b>' + pct + '</b>';
        if (mystery.unlocked) {
          mysteryOrb.innerHTML = '';
          if (mystery.photoUrl) {
            var im = document.createElement('img'); im.src = mystery.photoUrl; im.alt = ''; im.draggable = false;
            mysteryOrb.appendChild(im);
          } else {
            mysteryOrb.innerHTML = '<span class="q">' + ((mystery.name && mystery.name.charAt(0)) || '✨') + '</span>';
          }
          mysteryName.hidden = false;
          mysteryName.textContent = mystery.name +
            (mystery.age ? ', ' + mystery.age : '') + (mystery.city ? ' · ' + mystery.city : '');
          mysteryBtn.hidden = true;
        } else {
          mysteryOrb.innerHTML = '<span class="q">?</span>';
          mysteryName.hidden = true;
          mysteryBtn.hidden = false; mysteryBtn.disabled = false;
          mysteryBtn.textContent = t('mystery_unlock');
        }
      }

      mysteryBtn.addEventListener('click', function(){
        if (mysteryBusy || !mystery || mystery.unlocked) return;
        if (starsBalance() < 10) { haptic('rigid'); openPaywall(); return; }   // top up first
        mysteryBusy = true; mysteryBtn.disabled = true; mysteryBtn.textContent = t('mystery_unlocking');
        api('/api/interact', { op: 'unlock_mystery_match' }).then(function(res){
          mysteryBusy = false;
          if (!res || !res.ok) {
            mysteryBtn.disabled = false;
            if (res && res.reason === 'insufficient') { mysteryBtn.textContent = t('not_enough_stars'); openPaywall(); }
            else mysteryBtn.textContent = t('mystery_unlock');
            return;
          }
          if (typeof res.starsBalance === 'number') persistStars(res.starsBalance);
          if (res.profile) { res.profile.unlocked = true; renderMystery(res.profile); }
          haptic('heavy');
        }).catch(function(){
          mysteryBusy = false; mysteryBtn.disabled = false;
          mysteryBtn.textContent = t('mystery_unlock');
        });
      });

      // ---- 🎁 Lootboxes ("Скриньки Удачі") -------------------------------
      var lootBack   = document.getElementById('lootBack');
      var lootBoxesEl= document.getElementById('lootBoxes');
      var lootResult = document.getElementById('lootResult');
      var lootCost   = document.getElementById('lootCost');
      var LOOT_LABELS = {
        '+3_swipes':   t('loot_win_swipes'),
        'discount_30': t('loot_win_discount'),
        'empty':       t('loot_win_empty')
      };

      function openLootboxModal(){
        if (lootOpen) return;
        lootOpen = true;
        lootResult.textContent = ''; lootResult.className = 'loot-result';
        Array.prototype.forEach.call(lootBoxesEl.children, function(b){
          b.className = 'loot-box'; b.textContent = '🎁'; b.disabled = false;
        });
        lootCost.textContent = t('loot_first_free');
        lootBack.classList.add('show');
      }
      function closeLootbox(){ lootOpen = false; lootBack.classList.remove('show'); }

      Array.prototype.forEach.call(lootBoxesEl.children, function(box){
        box.addEventListener('click', function(){
          if (lootBusy || box.classList.contains('opened')) return;
          lootBusy = true; box.classList.add('opening'); haptic('medium');
          api('/api/interact', { op: 'open_lootbox' }).then(function(res){
            lootBusy = false; box.classList.remove('opening');
            if (!res || !res.ok) {   // out of Stars for another paid open
              lootResult.textContent = t('loot_no_stars');
              lootResult.className = 'loot-result';
              lootCost.textContent = t('loot_try_premium');
              return;
            }
            if (typeof res.starsBalance === 'number') persistStars(res.starsBalance);
            var win = res.rewardType !== 'empty';
            box.classList.add('opened'); if (win) box.classList.add('win');
            box.textContent = win ? '✨' : '📭';
            lootResult.textContent = LOOT_LABELS[res.rewardType] || '';
            lootResult.className = 'loot-result' + (win ? ' win' : '');
            haptic(win ? 'heavy' : 'light');

            if (res.rewardType === '+3_swipes') {
              // Server rolled usage back by 3; let them resume swiping.
              likesLeft = (likesLeft === null ? null : 3);
              setTimeout(function(){ closeLootbox(); render(); }, 1500);
            } else if (res.rewardType === 'discount_30') {
              try {
                localStorage.setItem('sixtio_premium_discount',
                  JSON.stringify({ pct: 30, day: new Date().toISOString().slice(0, 10) }));
              } catch(e){}
            }
            lootCost.textContent = t('loot_next', { bal: starsBalance() });
          }).catch(function(){ lootBusy = false; box.classList.remove('opening'); });
        });
      });

      document.getElementById('lootClose').addEventListener('click', closeLootbox);
      document.getElementById('lootPremium').addEventListener('click', function(){ closeLootbox(); openPaywall(); });
      lootBack.addEventListener('click', function(e){ if (e.target === lootBack) closeLootbox(); });

      loadMore();
    })();
  </script>
</body>
</html>
