<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — метчі</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js?v=40"></script>
<script src="theme.js?v=40"></script>
<script src="paywall.js?v=40"></script>
<link rel="stylesheet" href="theme.css?v=40" />
<style>
  body{
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 16px) 16px 12px;
    overflow-y:auto; gap:12px;
  }
  body > *{ position:relative; z-index:1; }
  .bg-dots, .bg-aura{ z-index:0; }

  /* empty / searching state */
  .search-banner{ display:flex; align-items:center; gap:12px; width:100%; max-width:460px;
    padding:14px 16px; }
  .pulse{ position:relative; width:14px; height:14px; flex-shrink:0; }
  .pulse::before, .pulse::after{ content:''; position:absolute; inset:0; border-radius:50%;
    background:linear-gradient(120deg, var(--a2), var(--a1)); }
  .pulse::after{ animation:pulse 1.8s ease-out infinite; }
  @keyframes pulse{ from{ transform:scale(1); opacity:.7; } to{ transform:scale(2.6); opacity:0; } }
  .search-banner .txt{ font-size:13px; line-height:1.45; color:var(--hint); }
  .search-banner .txt b{ color:var(--text); font-weight:600; }
  .find-btn{ width:100%; max-width:460px; }

  /* Clarity screen header */
  .scr-head{ width:100%; max-width:460px; display:flex; align-items:flex-end;
    justify-content:space-between; margin-top:2px; }
  .scr-title{ font-size:28px; font-weight:600; letter-spacing:-.02em; color:var(--ink); }
  .scr-sub{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .stars-pill{ display:inline-flex; align-items:center; gap:6px; padding:8px 13px; border-radius:16px;
    border:1px solid var(--star-border); background:var(--star-bg); color:var(--star-ink);
    font-size:13px; font-weight:700; }

  /* Clarity match list */
  .match-list{ width:100%; max-width:460px; display:flex; flex-direction:column; gap:12px; }
  /* Rows are <a> elements — explicitly strip link styling so name/age, city and
     the vibe line read as premium card typography, never underlined hyperlinks. */
  .match-row{ display:flex; align-items:center; gap:14px; width:100%; text-align:left;
    padding:12px; border-radius:22px; cursor:pointer; font-family:inherit; color:var(--ink);
    text-decoration:none; background:var(--surface); box-shadow:0 12px 30px -20px rgba(60,45,30,.5);
    transition:transform .12s ease; }
  .match-row:active{ transform:scale(.99); }
  .row-ava{ width:62px; height:62px; border-radius:20px; object-fit:cover; flex-shrink:0; }
  .row-ava-ph{ width:62px; height:62px; border-radius:20px; flex-shrink:0; display:flex;
    align-items:center; justify-content:center; font-size:28px;
    background:var(--chip); border:1px solid var(--hair); color:var(--muted); }
  .row-main{ flex:1; min-width:0; }
  .row-name{ font-size:18px; font-weight:600; letter-spacing:-.01em; line-height:1.25;
    color:var(--ink); overflow-wrap:break-word; }
  .row-name .age{ font-size:13px; font-weight:400; color:var(--muted); margin-left:6px; }
  .row-score{ flex-shrink:0; font-size:11px; font-weight:700; color:var(--acc); }
  /* Big Five compatibility pill + shared-interest note on one line (design) */
  .row-pctline{ display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .row-pct{ display:inline-block; font-size:11.5px; font-weight:600; letter-spacing:.01em;
    color:var(--acc); padding:3px 9px; border-radius:999px;
    background:rgba(var(--acc-rgb),.09); border:1px solid rgba(var(--acc-rgb),.18); }
  .row-common{ font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* Premium teaser (coral, design language) — honest upsell, opens the Stars shop */
  .premium-teaser{ width:100%; max-width:460px; display:flex; align-items:center; gap:14px;
    padding:16px; border-radius:22px; cursor:pointer; font-family:inherit; text-align:left;
    background:linear-gradient(180deg, var(--coral-card1), var(--coral-card2));
    border:1px solid rgba(255,90,44,.18); box-shadow:0 14px 34px -22px rgba(255,90,44,.5);
    transition:transform .12s ease; }
  .premium-teaser:active{ transform:scale(.99); }
  .pt-ico{ width:40px; height:40px; border-radius:13px; flex:none; display:flex; align-items:center;
    justify-content:center; background:rgba(255,90,44,.12); }
  .pt-ico svg{ width:19px; height:19px; }
  .pt-body{ flex:1; min-width:0; }
  .pt-title{ font-size:13.5px; font-weight:600; color:var(--ink); }
  .pt-sub{ font-size:11.5px; color:var(--coral-mut); margin-top:2px; }
  .pt-chev{ flex:none; font-size:15px; color:var(--coral-ink); }
  .row-meta{ font-size:11.5px; color:var(--muted); margin-top:2px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .row-chev{ flex-shrink:0; font-size:20px; color:var(--faint); }
  /* Dark Mode (18+) intimate line — coral Clarity language */
  .row-dark{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:8px;
    padding:8px 11px; border-radius:12px;
    background:rgba(255,90,44,.08); border:1px solid rgba(255,90,44,.22); }
  .row-dark-score{ font-size:12px; font-weight:700; color:var(--coral-ink); }
  .row-dark-tags{ display:flex; flex-wrap:wrap; gap:6px; }
  .row-dark-tags.blurred{ filter:blur(4px); opacity:.85; pointer-events:none; }
  /* Locked (blurred) intimate block is itself a tap target → Stars shop */
  .row-dark.locked{ cursor:pointer; }
  .row-dark-tag{ font-size:10.5px; font-weight:600; padding:4px 9px; border-radius:999px;
    color:var(--coral-ink); background:rgba(255,90,44,.1); border:1px solid rgba(255,90,44,.24); }

  /* "Хто тебе лайкнув" entry card. Deliberately states the real number: the
     count is free, so the card must never feel like a tease for the count. */
  .likes-card{ width:100%; max-width:460px; display:flex; align-items:center; gap:14px;
    padding:14px 16px; border-radius:22px; cursor:pointer; font-family:inherit; text-align:left;
    background:var(--surface); border:1px solid rgba(var(--acc-rgb),.2);
    box-shadow:0 12px 30px -20px rgba(60,45,30,.5); transition:transform .12s ease; }
  .likes-card:active{ transform:scale(.99); }
  .lc-ico{ width:40px; height:40px; border-radius:13px; flex:none; display:flex; align-items:center;
    justify-content:center; background:rgba(var(--acc-rgb),.1); font-size:18px; }
  .lc-body{ flex:1; min-width:0; }
  .lc-title{ font-size:14px; font-weight:600; color:var(--ink); }
  .lc-sub{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .lc-count{ flex:none; min-width:28px; height:28px; padding:0 9px; border-radius:999px;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;
    color:#fff; background:var(--acc); }

  /* Likers sheet — Clarity surface (theme-aware), NOT the 18+ tinted one. */
  .lk-overlay{ position:fixed; inset:0; z-index:1100; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end; background:rgba(20,14,10,.5);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    opacity:0; transition:opacity .22s ease; padding:16px;
    padding-bottom:calc(env(safe-area-inset-bottom) + 16px); overflow-y:auto; }
  .lk-overlay.show{ opacity:1; }
  .lk-sheet{ width:100%; max-width:440px; margin-top:auto; position:relative;
    border-radius:26px; padding:22px 20px; background:var(--surface);
    border:1px solid var(--hair); box-shadow:0 20px 60px -20px rgba(0,0,0,.45);
    transform:translateY(24px); transition:transform .26s cubic-bezier(.2,.8,.2,1); }
  .lk-overlay.show .lk-sheet{ transform:translateY(0); }
  .lk-close{ position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%;
    border:1px solid var(--hair); background:var(--chip); color:var(--ink);
    font-size:15px; cursor:pointer; font-family:inherit; line-height:1; }
  .lk-title{ font-size:17px; font-weight:600; letter-spacing:-.01em; color:var(--ink); }
  .lk-sub{ font-size:12px; color:var(--muted); margin-top:3px; }
  .lk-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-top:18px; }
  .lk-item{ display:flex; flex-direction:column; align-items:center; gap:6px;
    border:none; background:none; padding:0; font-family:inherit; cursor:default; }
  .lk-item.locked{ cursor:pointer; }
  .lk-ava-wrap{ position:relative; width:100%; aspect-ratio:1; border-radius:18px; overflow:hidden;
    background:var(--chip); border:1px solid var(--hair); }
  .lk-ava{ width:100%; height:100%; object-fit:cover; display:block; }
  /* The lock is drawn client-side, but the blur is NOT the security boundary —
     a locked liker's photo/name never leaves the server (see api/interact.js). */
  .lk-item.locked .lk-ava{ filter:blur(10px); transform:scale(1.15); }
  .lk-ava-ph{ width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-size:26px; color:var(--muted); }
  .lk-lock{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:20px; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.5); }
  .lk-name{ font-size:12px; font-weight:600; color:var(--ink); text-align:center;
    max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lk-name.dim{ color:var(--muted); font-weight:500; }
  .lk-price{ font-size:10.5px; font-weight:700; color:var(--acc); }
  .lk-pass{ width:100%; margin-top:18px; border:none; border-radius:999px; padding:15px;
    font-size:14.5px; font-weight:700; color:#fff; font-family:inherit; cursor:pointer;
    background:var(--acc); }
  .lk-pass:disabled{ opacity:.55; cursor:default; }
  .lk-note{ font-size:12px; color:var(--muted); text-align:center; margin-top:10px; min-height:16px; }
  .lk-empty{ font-size:13px; line-height:1.6; color:var(--hint); text-align:center; padding:24px 8px; }

  .hint-empty{ max-width:340px; text-align:center; font-size:13px; line-height:1.6;
    color:var(--hint); padding:16px; }
  .spin{ display:inline-block; width:15px; height:15px; border-radius:50%;
    border:2px solid rgba(255,255,255,.4); border-top-color:#fff; animation:spin .7s linear infinite;
    vertical-align:-2px; margin-right:6px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body class="has-tab-bar">
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="scr-head">
    <div>
      <div class="scr-title" data-i18n="tab_matches">Метчі</div>
      <div class="scr-sub" id="matchCount" data-i18n="matches_sub">Твої збіги</div>
    </div>
    <div class="hbar">
      <button class="theme-toggle" data-theme-toggle type="button"></button>
      <button class="stars-pill" id="starsPill" type="button"><span class="sstar">⭐</span><span id="starsVal">0</span></button>
    </div>
  </div>

  <button class="btn-primary find-btn" id="findBtn" data-i18n="find_btn">🔍 Знайти пару зараз</button>

  <div class="search-banner glass" id="searchBanner" hidden>
    <div class="pulse" aria-hidden="true"></div>
    <div class="txt" data-i18n-html="search_banner"><b>Sixtio шукає твою пару.</b> Тисни «Знайти пару», щойно захочеш — або чекай, поки зʼявиться хтось особливий.</div>
  </div>
  <div class="hint-empty glass" id="emptyHint" data-i18n="matches_empty" hidden>
    Поки що сумісних вільних кандидатів немає. Онови анкету через «Покращити профіль» — і спробуй ще 💜
  </div>

  <!-- Who liked you. Hidden at zero — an empty "0 people liked you" card is a
       worse experience than no card at all. -->
  <button class="likes-card" id="likesCard" type="button" hidden>
    <span class="lc-ico">💛</span>
    <span class="lc-body">
      <span class="lc-title" data-i18n="likers_title">Тебе лайкнули</span>
      <span class="lc-sub" id="likesSub"></span>
    </span>
    <span class="lc-count" id="likesCount">0</span>
  </button>

  <div class="match-list" id="matchList"></div>

  <!-- Premium teaser (design coral card) — honest upsell shown to free users. -->
  <button class="premium-teaser" id="premiumTeaser" type="button" hidden>
    <span class="pt-ico"><svg viewBox="0 0 24 24" fill="none" stroke="var(--coral-ink)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.5"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/></svg></span>
    <span class="pt-body">
      <span class="pt-title" data-i18n="teaser_title">Розкрий усі можливості</span>
      <span class="pt-sub" data-i18n="teaser_sub">Sixtio Premium: фото без блюру · безліміт свайпів</span>
    </span>
    <span class="pt-chev">›</span>
  </button>

  <nav class="tab-bar" aria-label="Навігація">
    <a class="tab-item" href="feed.html" aria-label="Стрічка"><span class="tico"><svg viewBox="0 0 24 24"><rect x="4" y="4.5" width="16" height="7" rx="2.2"/><rect x="4" y="14" width="16" height="5.5" rx="2"/></svg></span></a>
    <a class="tab-item active" href="matches.html" aria-label="Метчі"><span class="tico"><svg viewBox="0 0 24 24"><path d="M12 20.4S3.6 15.4 3.6 9.3C3.6 6.2 5.9 4.2 8.3 4.6 10 4.9 11.3 6 12 7.3 12.7 6 14 4.9 15.7 4.6c2.4-.4 4.7 1.6 4.7 4.7 0 6.1-8.4 11.1-8.4 11.1z"/></svg></span></a>
    <a class="tab-item" href="chat.html" aria-label="Чат"><span class="tico"><svg viewBox="0 0 24 24"><path d="M20 3.5H4A1.6 1.6 0 0 0 2.4 5.1v9.6A1.6 1.6 0 0 0 4 16.3h3.2v4L11.7 16.3H20a1.6 1.6 0 0 0 1.6-1.6V5.1A1.6 1.6 0 0 0 20 3.5z"/></svg></span></a>
    <a class="tab-item" href="profile.html" aria-label="Профіль"><span class="tico"><svg viewBox="0 0 24 24"><circle cx="12" cy="7.6" r="3.8"/><path d="M4.8 20a7.2 7.2 0 0 1 14.4 0z"/></svg></span></a>
  </nav>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
      }
      var initData = (tg && tg.initData) || '';
      var t = SixtioI18n.t;   // localized copy (uk/en/ru) — Task 26

      var listEl = document.getElementById('matchList');
      var banner = document.getElementById('searchBanner');
      var findBtn = document.getElementById('findBtn');
      var emptyHint = document.getElementById('emptyHint');

      function api(path, payload){
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.assign({ initData: initData }, payload))
        }).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
      }

      function row(m){
        var pt = m.partner || {};
        var a = document.createElement('a');
        a.className = 'match-row faux-glass';
        a.href = 'conversation.html?match=' + encodeURIComponent(m.matchId);
        if (tg && tg.HapticFeedback) {
          a.addEventListener('click', function(){ try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} });
        }

        if (pt.photoUrl) {
          var img = document.createElement('img');
          img.className = 'row-ava'; img.src = pt.photoUrl; img.alt = '';
          a.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.className = 'row-ava-ph'; ph.textContent = '🙂';
          a.appendChild(ph);
        }

        var main = document.createElement('div');
        main.className = 'row-main';
        var nm = document.createElement('div'); nm.className = 'row-name';
        nm.textContent = pt.name;
        if (pt.age) { var ageEl = document.createElement('span'); ageEl.className = 'age'; ageEl.textContent = pt.age; nm.appendChild(ageEl); }
        main.appendChild(nm);
        var meta = document.createElement('div'); meta.className = 'row-meta';
        meta.textContent = (pt.city || '') || t('row_meta_fallback');
        main.appendChild(meta);
        // EVERY card carries the percentage pill — Big Five math % when present,
        // else the AI 1–10 score rescaled (7/10 → 70%), else an explicit 0%.
        // Sits on its own line under the city so the name never truncates.
        var pctVal = (typeof m.compatibility === 'number') ? m.compatibility
          : (typeof m.score === 'number' && m.score > 0 ? Math.round(m.score * 10) : 0);
        var pctLine = document.createElement('div'); pctLine.className = 'row-pctline';
        var pct = document.createElement('span'); pct.className = 'row-pct';
        pct.textContent = t('row_pct', { pct: pctVal });
        pctLine.appendChild(pct);
        // Shared interests with this partner (design "спільне: …").
        if (m.common && m.common.length) {
          var com = document.createElement('span'); com.className = 'row-common';
          var first = SixtioI18n.interest ? SixtioI18n.interest(m.common[0]) : m.common[0];
          com.textContent = t('row_common', { x: String(first).toLowerCase() });
          pctLine.appendChild(com);
        }
        main.appendChild(pctLine);
        // Dark Mode (18+): the server includes this ONLY when both sides opted
        // in — same flame styling language as the feed card's intimate block.
        if (m.darkMode && typeof m.intimateCompatibility === 'number') {
          var dk = document.createElement('div'); dk.className = 'row-dark';
          var ds = document.createElement('span'); ds.className = 'row-dark-score';
          ds.textContent = t('row_intimate', { pct: m.intimateCompatibility });
          dk.appendChild(ds);
          // Row preview stays at the shared markers even for a match — the full
          // lists live on the match screen. Free and symmetric: no locked variant.
          var tagWrap = document.createElement('span');
          tagWrap.className = 'row-dark-tags';
          var tagList = (m.intimateTags || []).slice(0, 3);
          tagList.forEach(function(tag){
            var s = document.createElement('span'); s.className = 'row-dark-tag';
            s.textContent = SixtioI18n.kink(tag);
            tagWrap.appendChild(s);
          });
          if (tagList.length) dk.appendChild(tagWrap);
          main.appendChild(dk);
        }
        a.appendChild(main);

        var chev = document.createElement('div'); chev.className = 'row-chev'; chev.textContent = '›';
        a.appendChild(chev);
        return a;
      }

      var starsBal = 0;   // wallet balance for the paywall sheet, set on render

      function render(me){
        if (me.user && me.user.gender && window.SixtioTheme) {
          window.SixtioTheme.setGender(me.user.gender);
        }
        if (me.user && typeof me.user.starsBalance === 'number') starsBal = me.user.starsBalance;
        var sv = document.getElementById('starsVal'); if (sv) sv.textContent = starsBal;
        var matches = me.matches || [];
        listEl.innerHTML = '';
        // "Find match" is always available (unlimited matches).
        if (matches.length) {
          banner.hidden = true; emptyHint.hidden = true;
          matches.forEach(function(m){ listEl.appendChild(row(m)); });
        } else {
          banner.hidden = false;
        }
        // Premium teaser: only for free users, and only once there are matches
        // (never a dead-end empty screen). Honest upsell — opens the Stars shop.
        var teaser = document.getElementById('premiumTeaser');
        if (teaser) teaser.hidden = !(matches.length && me.user && !me.user.premium);
        renderLikes(me.user);
      }

      // --- Who liked you --------------------------------------------------
      // The count comes free with /api/me and is painted from cache instantly.
      // The list is fetched only when the sheet is opened, so the extra query
      // costs nothing on a normal app boot.
      var likesCardEl = document.getElementById('likesCard');
      // uk/ru decline "людина" by the last digit — SixtioI18n.plural owns that rule.
      var likersSub = function(n){ return SixtioI18n.plural('likers_sub', n); };

      function renderLikes(u){
        var n = (u && u.likersCount) || 0;
        likesCardEl.hidden = n === 0;
        if (!n) return;
        document.getElementById('likesCount').textContent = n;
        document.getElementById('likesSub').textContent = likersSub(n);
      }

      function daysLeft(iso){
        if (!iso) return 0;
        return Math.max(1, Math.ceil((new Date(iso).getTime() - Date.now()) / 86400000));
      }

      function openLikers(){
        var overlay = document.createElement('div');
        overlay.className = 'lk-overlay';
        overlay.innerHTML =
          '<div class="lk-sheet">' +
            '<button class="lk-close" type="button" aria-label="×">✕</button>' +
            '<div class="lk-title">' + t('likers_title') + '</div>' +
            '<div class="lk-sub" id="lkSub"></div>' +
            '<div class="lk-grid" id="lkGrid"></div>' +
            '<button class="lk-pass" id="lkPass" type="button" hidden></button>' +
            '<div class="lk-note" id="lkNote"></div>' +
          '</div>';
        document.body.appendChild(overlay);
        requestAnimationFrame(function(){ overlay.classList.add('show'); });

        function close(){
          overlay.classList.remove('show');
          setTimeout(function(){ overlay.remove(); }, 220);
        }
        overlay.querySelector('.lk-close').addEventListener('click', close);
        overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });

        var grid = overlay.querySelector('#lkGrid');
        var note = overlay.querySelector('#lkNote');
        var passBtn = overlay.querySelector('#lkPass');
        var subEl = overlay.querySelector('#lkSub');

        // Prices are server-supplied — the sheet never hardcodes what it charges.
        var state = { revealPrice: 5, passPrice: 40, passDays: 7 };

        function tile(p){
          var el = document.createElement('button');
          el.type = 'button';
          el.className = 'lk-item' + (p.locked ? ' locked' : '');
          var wrap = document.createElement('span'); wrap.className = 'lk-ava-wrap';
          if (p.photoUrl) {
            var img = document.createElement('img');
            img.className = 'lk-ava'; img.src = p.photoUrl; img.alt = '';
            wrap.appendChild(img);
          } else {
            var ph = document.createElement('span'); ph.className = 'lk-ava-ph'; ph.textContent = '🙂';
            wrap.appendChild(ph);
          }
          if (p.locked) {
            var lock = document.createElement('span'); lock.className = 'lk-lock'; lock.textContent = '🔒';
            wrap.appendChild(lock);
          }
          el.appendChild(wrap);

          var nameEl = document.createElement('span');
          nameEl.className = 'lk-name' + (p.locked ? ' dim' : '');
          nameEl.textContent = p.locked
            ? t('likers_hidden')
            : (p.name || '') + (p.age ? ', ' + p.age : '');
          el.appendChild(nameEl);

          if (p.locked) {
            var price = document.createElement('span');
            price.className = 'lk-price';
            price.textContent = t('likers_reveal', { p: state.revealPrice });
            el.appendChild(price);
            el.addEventListener('click', function(){ reveal(p.userId, el); });
          }
          return el;
        }

        function paint(data){
          state.revealPrice = data.revealPrice;
          state.passPrice = data.passPrice;
          state.passDays = data.passDays;

          grid.innerHTML = '';
          if (!data.likers.length) {
            var empty = document.createElement('div');
            empty.className = 'lk-empty'; empty.textContent = t('likers_empty');
            grid.appendChild(empty);
          } else {
            data.likers.forEach(function(p){ grid.appendChild(tile(p)); });
          }
          subEl.textContent = likersSub(data.count);

          var anyLocked = data.likers.some(function(p){ return p.locked; });
          if (data.pass) {
            passBtn.hidden = true;
            note.textContent = data.passUntil
              ? t('likers_pass_on', { d: daysLeft(data.passUntil) })
              : t('likers_pass_premium');
          } else if (anyLocked) {
            passBtn.hidden = false;
            passBtn.textContent = t('likers_pass_btn', { d: data.passDays, p: data.passPrice });
          } else {
            passBtn.hidden = true;
          }
        }

        function reveal(userId, el){
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }
          el.disabled = true;
          api('/api/interact', { op: 'reveal_liker', targetId: userId }).then(function(r){
            el.disabled = false;
            if (!r.ok) {
              if (r.reason === 'insufficient') {
                note.textContent = t('likers_low');
                if (window.SixtioPaywall) window.SixtioPaywall.open({
                  initData: initData, starsBalance: r.starsBalance || starsBal,
                  onSuccess: function(){ window.location.reload(); }
                });
              }
              return;
            }
            starsBal = r.starsBalance;
            var sv = document.getElementById('starsVal'); if (sv) sv.textContent = starsBal;
            el.replaceWith(tile(r.liker));
            note.textContent = '';
          }).catch(function(){ el.disabled = false; });
        }

        passBtn.addEventListener('click', function(){
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
          passBtn.disabled = true;
          api('/api/interact', { op: 'purchase', item: 'likes_pass' }).then(function(r){
            passBtn.disabled = false;
            if (!r.ok) {
              if (r.reason === 'insufficient') {
                note.textContent = t('likers_low');
                if (window.SixtioPaywall) window.SixtioPaywall.open({
                  initData: initData, starsBalance: r.starsBalance || starsBal,
                  onSuccess: function(){ window.location.reload(); }
                });
              }
              return;
            }
            starsBal = r.starsBalance;
            var sv = document.getElementById('starsVal'); if (sv) sv.textContent = starsBal;
            // Re-fetch rather than unlocking client-side: the freshly revealed
            // names have to come from the server, they were never sent before.
            return api('/api/interact', { op: 'likers' }).then(paint);
          }).catch(function(){ passBtn.disabled = false; });
        });

        api('/api/interact', { op: 'likers' }).then(paint).catch(function(){
          note.textContent = t('likers_swipe');
        });
      }

      likesCardEl.addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
        openLikers();
      });

      var teaserEl = document.getElementById('premiumTeaser');
      if (teaserEl) teaserEl.addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
        if (window.SixtioPaywall) window.SixtioPaywall.open({
          initData: initData, starsBalance: starsBal, highlight: 'premium',
          onSuccess: function(){ window.location.reload(); }
        });
      });

      // Cache-first: paint instantly from the last response, then refresh.
      try {
        var cached = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
        if (cached && cached.registered) render(cached);
      } catch(e){}

      function load(){
        return api('/api/me', {}).then(function(me){
          if (!me.registered) { window.location.replace('onboarding.html'); return; }
          localStorage.setItem('sixtio_me', JSON.stringify(me));
          render(me);
        });
      }

      // Open the swipe deck (feed.html) — discovery is compatibility-ranked and
      // AI-free; the match list below stays as the entry to existing matches.
      findBtn.addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
        window.location.href = 'feed.html';
      });

      // Header Stars pill → open the Stars shop.
      var starsPill = document.getElementById('starsPill');
      if (starsPill) starsPill.addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }
        if (window.SixtioPaywall) window.SixtioPaywall.open({
          initData: initData, starsBalance: starsBal,
          onSuccess: function(){ window.location.reload(); }
        });
      });

      load().catch(function(){ /* offline — cache already shown */ });
    })();
  </script>
</body>
</html>
