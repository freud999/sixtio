<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — метчі</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="theme.css" />
<style>
  body{
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 16px) 16px 12px;
    overflow-y:auto; gap:12px;
  }
  body > *{ position:relative; z-index:1; }
  .bg-dots, .bg-aura{ z-index:0; }

  .page-title{ font-size:15px; letter-spacing:.12em; }

  /* empty / searching state */
  .search-banner{ display:flex; align-items:center; gap:12px; width:100%; max-width:460px;
    padding:14px 16px; }
  .pulse{ position:relative; width:14px; height:14px; flex-shrink:0; }
  .pulse::before, .pulse::after{ content:''; position:absolute; inset:0; border-radius:50%;
    background:linear-gradient(120deg, var(--a2), var(--a1)); }
  .pulse::after{ animation:pulse 1.8s ease-out infinite; }
  @keyframes pulse{ from{ transform:scale(1); opacity:.7; } to{ transform:scale(2.6); opacity:0; } }
  .search-banner .txt{ font-size:13px; line-height:1.45; color:var(--hint); }
  .search-banner .txt b{ color:var(--text); font-weight:600; }
  .find-btn{ width:100%; max-width:460px; }

  /* compact match list */
  .match-list{ width:100%; max-width:460px; display:flex; flex-direction:column; gap:10px; }
  .match-row{ display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:11px 12px; border-radius:20px; cursor:pointer; font-family:inherit; color:var(--text);
    transition:transform .12s ease; }
  .match-row:active{ transform:scale(.985); }
  .row-ava{ width:56px; height:56px; border-radius:50%; object-fit:cover; flex-shrink:0;
    border:2px solid transparent; background:
      linear-gradient(var(--bg),var(--bg)) padding-box,
      linear-gradient(120deg, var(--a2), var(--a1)) border-box; }
  .row-ava-ph{ width:56px; height:56px; border-radius:50%; flex-shrink:0; display:flex;
    align-items:center; justify-content:center; font-size:26px;
    background:var(--faux-glass); border:1px solid var(--glass-border); color:var(--hint); }
  .row-main{ flex:1; min-width:0; }
  .row-top{ display:flex; align-items:baseline; gap:8px; }
  .row-name{ font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row-score{ flex-shrink:0; font-size:11px; font-weight:800; letter-spacing:.04em;
    color:var(--a1); }
  /* Big Five compatibility pill */
  .row-pct{ flex-shrink:0; font-size:11px; font-weight:800; letter-spacing:.02em;
    color:#fff; padding:2px 8px; border-radius:999px;
    background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 2px 8px -2px var(--glow); }
  .row-meta{ font-size:12px; color:var(--hint); margin-top:1px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  /* Shared-value callout: an accent left-rail makes the "why you match" line
     (e.g. «Ви обидва цінуєте щирість») read as a highlighted value, not filler. */
  .row-vibe{ font-size:14px; font-weight:400; color:#E0E0E0;
    font-family:'Inter','Roboto',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    line-height:1.45; margin-top:7px; padding:8px 12px 8px 13px; border-radius:12px;
    font-style:normal; text-decoration:none;
    background:rgba(255,255,255,.05); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.08);
    border-left:3px solid color-mix(in srgb, var(--accent-current) 75%, transparent); }
  .row-chev{ flex-shrink:0; font-size:22px; color:var(--a1); opacity:.7; }

  .hint-empty{ max-width:340px; text-align:center; font-size:13px; line-height:1.6;
    color:var(--hint); padding:16px; }
  .spin{ display:inline-block; width:15px; height:15px; border-radius:50%;
    border:2px solid rgba(255,255,255,.4); border-top-color:#fff; animation:spin .7s linear infinite;
    vertical-align:-2px; margin-right:6px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body class="has-tab-bar">
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="page-title led grad-text">МЕТЧІ</div>

  <button class="btn-primary find-btn" id="findBtn">🔍 Знайти пару зараз</button>

  <div class="search-banner glass" id="searchBanner" hidden>
    <div class="pulse" aria-hidden="true"></div>
    <div class="txt"><b>Sixtio шукає твою пару.</b> Тисни «Знайти пару», щойно захочеш — або чекай, поки зʼявиться хтось особливий.</div>
  </div>
  <div class="hint-empty glass" id="emptyHint" hidden>
    Поки що сумісних вільних кандидатів немає. Онови анкету через «Покращити профіль» — і спробуй ще 💜
  </div>

  <div class="match-list" id="matchList"></div>

  <nav class="tab-bar">
    <a class="tab-item active" href="matches.html"><span class="ico">💜</span>Метчі</a>
    <a class="tab-item" href="chat.html"><span class="ico">💬</span>Чат</a>
    <a class="tab-item" href="profile.html"><span class="ico">👤</span>Профіль</a>
  </nav>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
      }
      var initData = (tg && tg.initData) || '';

      var listEl = document.getElementById('matchList');
      var banner = document.getElementById('searchBanner');
      var findBtn = document.getElementById('findBtn');
      var emptyHint = document.getElementById('emptyHint');

      function api(path, payload){
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.assign({ initData: initData }, payload))
        }).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
      }

      function row(m){
        var pt = m.partner || {};
        var a = document.createElement('a');
        a.className = 'match-row faux-glass';
        a.href = 'conversation.html?match=' + encodeURIComponent(m.matchId);
        if (tg && tg.HapticFeedback) {
          a.addEventListener('click', function(){ try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} });
        }

        if (pt.photoUrl) {
          var img = document.createElement('img');
          img.className = 'row-ava'; img.src = pt.photoUrl; img.alt = '';
          a.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.className = 'row-ava-ph'; ph.textContent = '🙂';
          a.appendChild(ph);
        }

        var main = document.createElement('div');
        main.className = 'row-main';
        var top = document.createElement('div'); top.className = 'row-top';
        var nm = document.createElement('div'); nm.className = 'row-name';
        nm.textContent = pt.name + (pt.age ? ', ' + pt.age : '');
        top.appendChild(nm);
        // Always anchor on a percentage — Big Five math % when present, else the
        // AI 1–10 score rescaled to % (7/10 → 70%). Same pill for both, so the
        // eye reads one consistent "% сумісність" metric.
        if (typeof m.compatibility === 'number') {
          var pct = document.createElement('div'); pct.className = 'row-pct';
          pct.textContent = m.compatibility + '% сумісність';
          top.appendChild(pct);
        } else if (m.score) {
          var sc = document.createElement('div'); sc.className = 'row-pct';
          sc.textContent = Math.round(m.score * 10) + '% сумісність';
          top.appendChild(sc);
        }
        main.appendChild(top);
        var meta = document.createElement('div'); meta.className = 'row-meta';
        meta.textContent = (pt.city ? '📍 ' + pt.city : '') || 'ваша пара від Sixtio';
        main.appendChild(meta);
        var vibe = pt.vibe || m.reason || '';
        if (vibe) {
          var vb = document.createElement('div'); vb.className = 'row-vibe';
          vb.textContent = vibe;
          main.appendChild(vb);
        }
        a.appendChild(main);

        var chev = document.createElement('div'); chev.className = 'row-chev'; chev.textContent = '›';
        a.appendChild(chev);
        return a;
      }

      function render(me){
        if (me.user && me.user.gender && window.SixtioTheme) {
          window.SixtioTheme.setGender(me.user.gender);
        }
        var matches = me.matches || [];
        listEl.innerHTML = '';
        // "Find match" is always available (unlimited matches).
        if (matches.length) {
          banner.hidden = true; emptyHint.hidden = true;
          matches.forEach(function(m){ listEl.appendChild(row(m)); });
        } else {
          banner.hidden = false;
        }
      }

      // Cache-first: paint instantly from the last response, then refresh.
      try {
        var cached = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
        if (cached && cached.registered) render(cached);
      } catch(e){}

      function load(){
        return api('/api/me', {}).then(function(me){
          if (!me.registered) { window.location.replace('onboarding.html'); return; }
          localStorage.setItem('sixtio_me', JSON.stringify(me));
          render(me);
        });
      }

      // Open the swipe deck (feed.html) — discovery is compatibility-ranked and
      // AI-free; the match list below stays as the entry to existing matches.
      findBtn.addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
        window.location.href = 'feed.html';
      });

      load().catch(function(){ /* offline — cache already shown */ });
    })();
  </script>
</body>
</html>
