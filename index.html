<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #16151c);
    --hint: var(--tg-theme-hint-color, #8b8a94);
    --card: var(--tg-theme-secondary-bg-color, #f4f3f8);
    --violet: #7F77DD;
    --violet-deep: #534AB7;
    --teal: #1D9E75;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column;
    min-height:100dvh;
    padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
    overflow:hidden;
  }
  .top{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:22px; }

  /* signature: two orbiting dots that connect */
  .orbit{ width:132px; height:132px; position:relative; }
  .ring{ position:absolute; inset:0; border-radius:50%; border:1px solid var(--card); }
  .line{ position:absolute; top:50%; left:26px; right:26px; height:2px; transform:translateY(-50%) scaleX(0);
    background:linear-gradient(90deg,var(--violet),var(--teal)); border-radius:2px;
    animation:link 4s ease-in-out infinite; transform-origin:center; }
  .dot{ position:absolute; top:50%; width:22px; height:22px; border-radius:50%; margin-top:-11px; }
  .dot.a{ left:15px; background:var(--violet); animation:driftA 4s ease-in-out infinite; }
  .dot.b{ right:15px; background:var(--teal); animation:driftB 4s ease-in-out infinite; }
  @keyframes driftA{ 0%,100%{transform:translateX(-14px)} 45%,70%{transform:translateX(30px)} }
  @keyframes driftB{ 0%,100%{transform:translateX(14px)} 45%,70%{transform:translateX(-30px)} }
  @keyframes link{ 0%,25%{transform:translateY(-50%) scaleX(0);opacity:0} 50%,68%{transform:translateY(-50%) scaleX(1);opacity:1} 90%,100%{transform:translateY(-50%) scaleX(0);opacity:0} }

  .wordmark{ font-size:34px; font-weight:600; letter-spacing:-0.5px; }
  .wordmark span{ background:linear-gradient(90deg,var(--violet-deep),var(--teal)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .thesis{ font-size:20px; font-weight:500; line-height:1.35; max-width:300px; }
  .sub{ font-size:15px; line-height:1.55; color:var(--hint); max-width:300px; }

  .bottom{ padding:16px 0 8px; }
  .cta{ width:100%; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:600;
    color:#fff; background:var(--violet-deep); cursor:pointer; transition:transform .12s ease, opacity .12s ease; }
  .cta:active{ transform:scale(0.98); opacity:.92; }
  .note{ text-align:center; font-size:12px; color:var(--hint); margin-top:12px; }
  .note b{ color:var(--teal); font-weight:600; }

  @media (prefers-reduced-motion: reduce){
    .dot.a,.dot.b,.line{ animation:none; }
    .line{ transform:translateY(-50%) scaleX(1); opacity:1; }
    .dot.a{ transform:translateX(30px); } .dot.b{ transform:translateX(-30px); }
  }
</style>
</head>
<body>
  <div class="top">
    <div class="orbit" aria-hidden="true">
      <div class="ring"></div>
      <div class="line"></div>
      <div class="dot a"></div>
      <div class="dot b"></div>
    </div>
    <h1 class="wordmark"><span>Sixtio</span></h1>
    <p class="thesis" id="thesis">Не свайпи. Знайомства, які справді мають сенс.</p>
    <p class="sub" id="sub">Sixtio — розумна сваха. Вона ставить кілька щирих запитань, вивчає, хто ви, і знаходить людину, з якою у вас справжня сумісність.</p>
  </div>

  <div class="bottom">
    <button class="cta" id="start">Познайомитись із Sixtio</button>
    <p class="note"><b>Приватно.</b>&nbsp; Вашого профілю Telegram ніхто не бачить.</p>
  </div>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('secondary_bg_color'); } catch(e){}
        // personal greeting if Telegram shares a first name
        var name = tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name;
        if (name) {
          document.getElementById('thesis').textContent = 'Привіт, ' + name + '! Готові до справжнього знайомства?';
        }
      }
      document.getElementById('start').addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
        window.location.href = 'onboarding.html';
      });

      // Returning user with a finished profile goes straight to the waiting screen.
      fetch('/api/me', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: (tg && tg.initData) || '' })
      }).then(function(r){ return r.ok ? r.json() : null; })
        .then(function(me){
          if (me && me.profile) window.location.replace('waiting.html');
        })
        .catch(function(){ /* offline — stay on the welcome screen */ });
    })();
  </script>
</body>
</html>
