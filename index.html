<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="theme.css" />
<style>
  body{
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
    overflow:hidden;
  }
  .top{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:20px; position:relative; z-index:1; }
  .bottom{ padding:16px 0 10px; position:relative; z-index:1; }

  /* hero: aura orb with the two connecting dots inside */
  .hero{ width:170px; height:170px; border-radius:50%; position:relative;
    background:radial-gradient(85% 85% at 50% 30%,
      var(--a1) 0%, var(--a2) 55%,
      color-mix(in srgb, var(--a2) 25%, var(--aura-deep)) 100%);
    box-shadow:0 24px 70px -18px var(--glow), inset 0 1px 0 rgba(255,255,255,.35);
    transition:background .6s ease, box-shadow .6s ease; }
  .hero::after{ content:''; position:absolute; inset:-22px; border-radius:50%;
    background:radial-gradient(50% 50% at 50% 50%, var(--glow), transparent 70%);
    filter:blur(18px); z-index:-1; }
  .line{ position:absolute; top:50%; left:36px; right:36px; height:3px;
    transform:translateY(-50%) scaleX(0); background:rgba(255,255,255,.9); border-radius:3px;
    animation:link 4s ease-in-out infinite; transform-origin:center; }
  .dot{ position:absolute; top:50%; width:22px; height:22px; border-radius:50%; margin-top:-11px;
    background:#fff; box-shadow:0 4px 14px rgba(0,0,0,.25); }
  .dot.a{ left:26px; animation:driftA 4s ease-in-out infinite; }
  .dot.b{ right:26px; animation:driftB 4s ease-in-out infinite; }
  @keyframes driftA{ 0%,100%{transform:translateX(-10px)} 45%,70%{transform:translateX(34px)} }
  @keyframes driftB{ 0%,100%{transform:translateX(10px)} 45%,70%{transform:translateX(-34px)} }
  @keyframes link{ 0%,25%{transform:translateY(-50%) scaleX(0);opacity:0} 50%,68%{transform:translateY(-50%) scaleX(1);opacity:1} 90%,100%{transform:translateY(-50%) scaleX(0);opacity:0} }

  .wordmark{ font-size:46px; line-height:1; }
  .thesis{ font-size:21px; font-weight:600; line-height:1.32; max-width:310px; letter-spacing:-0.3px; }

  .sub-card{ max-width:330px; padding:16px 18px; font-size:14px; line-height:1.6; color:var(--hint); }

  .note{ text-align:center; font-size:12px; color:var(--hint); margin-top:14px; }
  .note b{ color:var(--a1); font-weight:700; }

  @media (prefers-reduced-motion: reduce){
    .line{ transform:translateY(-50%) scaleX(1); opacity:1; }
    .dot.a{ transform:translateX(34px); } .dot.b{ transform:translateX(-34px); }
  }
</style>
</head>
<body>
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="top">
    <div class="hero" aria-hidden="true">
      <div class="line"></div>
      <div class="dot a"></div>
      <div class="dot b"></div>
    </div>
    <h1 class="wordmark led grad-text">Sixtio</h1>
    <p class="thesis" id="thesis" data-i18n="idx_thesis">Не свайпи. Знайомства, які справді мають сенс.</p>
    <div class="sub-card glass">
      <span id="sub" data-i18n="idx_sub">Sixtio — розумна сваха. Вона ставить кілька щирих запитань, вивчає, хто ви, і знаходить людину, з якою у вас справжня сумісність.</span>
    </div>
  </div>

  <div class="bottom">
    <button class="btn-primary" id="start" style="width:100%;" data-i18n="idx_start">Познайомитись із Sixtio</button>
    <p class="note" data-i18n-html="idx_note"><b>Приватно.</b>&nbsp; Вашого профілю Telegram ніхто не бачить.</p>
    <p class="note" style="margin-top:6px;"><a href="privacy.html" style="color:var(--hint);" data-i18n="privacy_policy">Політика конфіденційності</a></p>
  </div>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
        // personal greeting if Telegram shares a first name
        var name = tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name;
        if (name) {
          var thesis = document.getElementById('thesis');
          // Drop the static key first — the DOMContentLoaded i18n pass must not
          // overwrite the personal greeting back to the generic thesis line.
          thesis.removeAttribute('data-i18n');
          thesis.textContent = SixtioI18n.t('idx_hello', { name: name });
        }
      }
      document.getElementById('start').addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(e){} }
        window.location.href = 'onboarding.html';
      });

      // Returning user with a finished profile goes straight to the waiting screen.
      fetch('/api/me', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: (tg && tg.initData) || '' })
      }).then(function(r){ return r.ok ? r.json() : null; })
        .then(function(me){
          if (me && me.registered) {
            try { localStorage.setItem('sixtio_me', JSON.stringify(me)); } catch(e){}
          }
          if (me && me.user && window.SixtioTheme && me.user.gender) {
            window.SixtioTheme.setGender(me.user.gender);
          }
          if (me && me.profile) window.location.replace('matches.html');
        })
        .catch(function(){ /* offline — stay on the welcome screen */ });
    })();
  </script>
</body>
</html>
