<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — знайомство</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="theme.css" />
<style>
  body{ display:flex; flex-direction:column; overflow:hidden; }
  .header, .chat, .composer{ position:relative; z-index:1; }

  /* progress header */
  .header{ padding:calc(env(safe-area-inset-top) + 14px) 20px 10px; }
  .progress-track{ height:6px; border-radius:4px; background:var(--faux-glass);
    border:1px solid var(--glass-border); overflow:hidden; }
  .progress-fill{ height:100%; width:0%; border-radius:4px;
    background:linear-gradient(90deg, var(--a2), var(--a1));
    box-shadow:0 0 12px var(--glow);
    transition:width .45s ease, background .6s ease; }
  .step-label{ margin-top:9px; font-size:11px; color:var(--hint); text-align:center; letter-spacing:.08em; }

  /* chat area */
  .chat{ flex:1; overflow-y:auto; padding:8px 16px 12px; display:flex; flex-direction:column; gap:10px;
    -webkit-overflow-scrolling:touch; }
  .bubble{ max-width:82%; padding:12px 15px; border-radius:18px; font-size:15px; line-height:1.45;
    animation:pop .25s ease; opacity:0; animation-fill-mode:forwards; }
  @keyframes pop{ from{ opacity:0; transform:translateY(6px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
  .bubble.bot{ align-self:flex-start; background:var(--faux-glass);
    border:1px solid var(--glass-border); color:var(--text); border-bottom-left-radius:5px; }
  .bubble.user{ align-self:flex-end; color:#fff; border-bottom-right-radius:5px;
    background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 8px 22px -10px var(--glow); transition:background .6s ease; }
  .bubble.photo{ align-self:flex-end; padding:5px;
    background:linear-gradient(120deg, var(--a2), var(--a1)); box-shadow:0 8px 22px -10px var(--glow); }
  .bubble.photo img{ display:block; width:160px; height:160px; object-fit:cover; border-radius:14px; }
  .bubble.typing{ align-self:flex-start; background:var(--faux-glass);
    border:1px solid var(--glass-border); display:flex; gap:4px; align-items:center; padding:14px 16px; }
  .typing-dot{ width:6px; height:6px; border-radius:50%; background:var(--a1); animation:blink 1.2s infinite ease-in-out; }
  .typing-dot:nth-child(2){ animation-delay:.15s; }
  .typing-dot:nth-child(3){ animation-delay:.3s; }
  @keyframes blink{ 0%,80%,100%{ opacity:.25; transform:scale(.85); } 40%{ opacity:1; transform:scale(1); } }

  /* option buttons */
  .options{ display:flex; flex-wrap:wrap; gap:8px; align-self:flex-start; max-width:90%;
    animation:pop .25s ease; opacity:0; animation-fill-mode:forwards; }
  .option-btn{ border:1px solid var(--glass-border); border-radius:999px;
    background:var(--faux-glass); color:var(--a1); font-size:14px; font-weight:600; padding:11px 17px;
    cursor:pointer; font-family:inherit;
    transition:transform .12s ease, opacity .12s ease, color .6s ease; }
  .option-btn:active{ transform:scale(0.96); opacity:.85; }
  .option-btn.secondary{ color:var(--hint); font-weight:500; }

  /* completion / profile card */
  .done-card{ align-self:center; text-align:center; max-width:92%; padding:18px; margin-top:8px; }
  .done-card .check{ font-size:30px; margin-bottom:6px; }
  .done-card .title{ font-size:17px; font-weight:600; margin-bottom:4px; }
  .done-card .sub{ font-size:13px; color:var(--hint); line-height:1.5; }
  .profile-card{ align-self:center; width:94%; margin-top:8px; padding:22px 18px;
    border-radius:28px; text-align:center; color:#fff;
    background:var(--a2);
    background:radial-gradient(130% 105% at 50% -12%,
      var(--a1) 0%, var(--a2) 50%,
      color-mix(in srgb, var(--a2) 28%, var(--aura-deep)) 100%);
    box-shadow:0 18px 48px -16px var(--glow);
    animation:pop .3s ease; opacity:0; animation-fill-mode:forwards; }
  .profile-card .check{ font-size:28px; margin-bottom:6px; }
  .profile-card .title{ font-size:17px; font-weight:700; margin-bottom:12px; color:#fff; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:14px; }
  .profile-card .chip{ font-size:13px; font-weight:600; padding:6px 12px; border-radius:999px;
    color:#fff; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.3); }
  .profile-card .summary{ font-size:14px; line-height:1.6; color:rgba(255,255,255,.94); }
  .profile-card .next{ font-size:12px; color:rgba(255,255,255,.65); margin-top:12px; }
  .continue-btn{ align-self:center; width:94%; margin:12px 0 8px; border:none; border-radius:999px;
    padding:16px; font-size:16px; font-weight:700; color:#fff; font-family:inherit;
    background:linear-gradient(120deg, var(--a2), var(--a1));
    box-shadow:0 12px 32px -10px var(--glow); cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
    animation:pop .3s ease; opacity:0; animation-fill-mode:forwards; }
  .continue-btn:active{ transform:scale(0.98); opacity:.92; }

  /* composer — one true-glass surface */
  .composer{ display:flex; gap:8px; align-items:flex-end;
    padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(24px) saturate(1.5); backdrop-filter:blur(24px) saturate(1.5);
    border-top:1px solid var(--glass-border); }
  .composer textarea{ flex:1; resize:none; max-height:110px; min-height:46px;
    border:1px solid var(--glass-border); border-radius:16px; padding:13px 15px; font-size:15px;
    font-family:inherit; color:var(--text); background:var(--faux-glass); outline:none; line-height:1.4; }
  .composer textarea::placeholder{ color:var(--hint); }
  .composer button{ flex-shrink:0; width:46px; height:46px; border:none; border-radius:50%;
    background:linear-gradient(120deg, var(--a2), var(--a1)); color:#fff; font-size:18px; cursor:pointer;
    box-shadow:0 8px 22px -8px var(--glow);
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s ease, opacity .12s ease, background .6s ease; }
  .composer button:active{ transform:scale(0.94); opacity:.9; }
  .composer button:disabled{ opacity:.4; }
  .composer.hidden{ display:none; }
</style>
</head>
<body>
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="header">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="step-label led" id="stepLabel">&nbsp;</div>
  </div>

  <div class="chat" id="chat"></div>

  <form class="composer" id="composer">
    <textarea id="answerInput" rows="1" placeholder="Напишіть відповідь..."></textarea>
    <button type="submit" id="sendBtn" aria-label="Надіслати">➤</button>
  </form>
  <input type="file" id="photoInput" accept="image/*" hidden />

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
      }

      // Deepen mode: a short, limited AI session to enrich an existing profile
      // (3 extra questions, no Gemini follow-ups — saves AI budget).
      var DEEPEN = window.location.search.indexOf('mode=deepen') !== -1;

      // ---- steps -------------------------------------------------------
      var profileSteps = [
        { id:'gender', type:'options', text:'Привіт! Я Sixtio 💜 Спершу трохи про тебе. Хто ти?',
          options:[{v:'male',label:'Чоловік'},{v:'female',label:'Жінка'}] },
        { id:'seekingGender', type:'options', text:'Кого ти хочеш зустріти?',
          options:[{v:'male',label:'Чоловіка'},{v:'female',label:'Жінку'},{v:'any',label:'Неважливо'}] },
        { id:'goal', type:'options', text:'Що ти шукаєш у Sixtio?',
          options:[{v:'longterm',label:'Довготривалі стосунки'},{v:'fun',label:'Розважитись'},{v:'situational',label:'По ситуації'}] },
        { id:'age', type:'number', text:'Скільки тобі років?' },
        { id:'city', type:'text', optional:true, text:'З якого ти міста?' },
        { id:'interests', type:'text', optional:true,
          text:'Розкажи про свої інтереси — просто через кому. Наприклад: подорожі, кіно, біг' },
        { id:'bio', type:'text', optional:true,
          text:'Кілька слів про себе — як би ти представив себе людині, яка тобі подобається?',
          textF:'Кілька слів про себе — як би ти представила себе людині, яка тобі подобається?' },
        { id:'photo', type:'photo', optional:true,
          text:'І додай своє фото — його побачить лише людина, з якою у вас метч.' }
      ];

      // Keep ids in sync with api/_lib/questions.js.
      // `text` — masculine/neutral form; `textF` — feminine form, picked once gender is known.
      var questions = [
        { id: "q1", text: "А тепер — найцікавіше. Опиши свій ідеальний будній вечір: з ким ти і що відбувається?" },
        { id: "q2", text: "Ти більше живеш за чітким планом чи любиш спонтанність? Розкажи на прикладі." },
        { id: "q3", text: "Що в людях чи в стосунках дратує тебе найбільше?" },
        { id: "q4", text: "Коли виникає конфлікт — ти одразу говориш про це, береш паузу подумати чи мовчиш?" },
        { id: "q5", text: "Що для тебе означає справжня близькість з людиною?" },
        { id: "q6", text: "Згадай момент за останній рік, коли ти відчував себе по-справжньому щасливим. Що тоді відбувалось?",
          textF: "Згадай момент за останній рік, коли ти відчувала себе по-справжньому щасливою. Що тоді відбувалось?" },
        { id: "q7", text: "Що тобі найбільше потрібно від партнера, коли тобі важко?" }
      ];

      // Keep ids in sync with api/_lib/questions.js (d1–d5).
      var deepenPool = [
        { id: "d1", text: "Як виглядають твої ідеальні вихідні?" },
        { id: "d2", text: "Яка риса в людях викликає в тебе найбільше захоплення?" },
        { id: "d3", text: "Про що ти мрієш на найближчі кілька років?" },
        { id: "d4", text: "Як ти відновлюєшся після важкого тижня?" },
        { id: "d5", text: "Що може миттєво зіпсувати тобі побачення?" }
      ];

      if (DEEPEN) {
        profileSteps = [];
        // 3 random extra questions per session
        questions = deepenPool.sort(function(){ return Math.random() - 0.5; }).slice(0, 3);
      }

      // Picks the feminine variant when the user said they're a woman.
      function stepText(step){
        return (profileData.gender === 'female' && step.textF) ? step.textF : step.text;
      }

      var TOTAL = profileSteps.length + questions.length;

      // ---- elements & state --------------------------------------------
      var chat = document.getElementById('chat');
      var composer = document.getElementById('composer');
      var input = document.getElementById('answerInput');
      var sendBtn = document.getElementById('sendBtn');
      var photoInput = document.getElementById('photoInput');
      var progressFill = document.getElementById('progressFill');
      var stepLabel = document.getElementById('stepLabel');

      var STORAGE_KEY = 'sixtio_onboarding_answers';
      var stage = DEEPEN ? 'psych' : 'profile';  // 'profile' | 'psych'
      var pIndex = 0;               // profile step index
      var index = 0;                // psych question index
      var phase = 'main';           // 'main' | 'followup' (psych only)
      var profileData = { interests: [] };
      var answers = [];
      var lastFollowupText = '';
      var detectedCity = null;

      // In deepen mode gender is already known — reuse it for wording and theme.
      if (DEEPEN) {
        try { profileData.gender = localStorage.getItem('sixtio_gender') || null; } catch(e){}
      }

      // City-by-IP suggestion (Vercel geo). Best-effort — never blocks onboarding.
      fetch('/api/geo').then(function(r){ return r.ok ? r.json() : null; })
        .then(function(g){ if (g && g.city) detectedCity = g.city; })
        .catch(function(){});

      function api(path, payload){
        var body = Object.assign({ initData: (tg && tg.initData) || '' }, payload);
        var controller = ('AbortController' in window) ? new AbortController() : null;
        if (controller) setTimeout(function(){ controller.abort(); }, 25000);
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller ? controller.signal : undefined
        }).then(function(r){
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      }

      // ---- chat helpers -------------------------------------------------
      function scrollToBottom(){
        requestAnimationFrame(function(){ chat.scrollTop = chat.scrollHeight; });
      }

      function addBubble(text, who){
        var el = document.createElement('div');
        el.className = 'bubble ' + who;
        el.textContent = text;
        chat.appendChild(el);
        scrollToBottom();
        return el;
      }

      function addPhotoBubble(dataUrl){
        var el = document.createElement('div');
        el.className = 'bubble photo';
        var img = document.createElement('img');
        img.src = dataUrl;
        img.alt = 'Твоє фото';
        el.appendChild(img);
        chat.appendChild(el);
        scrollToBottom();
      }

      function startTyping(){
        var el = document.createElement('div');
        el.className = 'bubble typing';
        el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        el.style.opacity = 1;
        chat.appendChild(el);
        scrollToBottom();
        return el;
      }

      function showTyping(callback){
        var el = startTyping();
        setTimeout(function(){
          el.remove();
          callback();
        }, 550 + Math.random() * 350);
      }

      function updateProgress(){
        var done = (stage === 'profile') ? pIndex : profileSteps.length + index;
        var pct = Math.min(done, TOTAL) / TOTAL * 100;
        progressFill.style.width = pct + '%';
        stepLabel.textContent = done < TOTAL ? 'Крок ' + (done + 1) + ' з ' + TOTAL : 'Готово';
      }

      function setComposer(enabled, placeholder){
        input.disabled = !enabled;
        sendBtn.disabled = !enabled;
        input.placeholder = placeholder || 'Напишіть відповідь...';
        if (enabled) input.focus();
      }

      var currentOptions = null;
      function showOptions(list){
        removeOptions();
        var wrap = document.createElement('div');
        wrap.className = 'options';
        list.forEach(function(opt){
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'option-btn' + (opt.secondary ? ' secondary' : '');
          btn.textContent = opt.label;
          btn.addEventListener('click', function(){
            if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }
            opt.onSelect();
          });
          wrap.appendChild(btn);
        });
        chat.appendChild(wrap);
        currentOptions = wrap;
        scrollToBottom();
      }
      function removeOptions(){
        if (currentOptions) { currentOptions.remove(); currentOptions = null; }
      }

      // ---- profile stage -------------------------------------------------
      function askNextProfile(){
        updateProgress();
        if (pIndex >= profileSteps.length) {
          submitProfileInfo();
          return;
        }
        var step = profileSteps[pIndex];
        setComposer(false);
        showTyping(function(){
          addBubble(stepText(step), 'bot');
          if (step.type === 'options') {
            showOptions(step.options.map(function(o){
              return { label: o.label, onSelect: function(){ answerProfile(step, o.v, o.label); } };
            }));
          } else if (step.type === 'photo') {
            showOptions([
              { label: '📷 Обрати фото', onSelect: function(){ photoInput.click(); } },
              { label: 'Пропустити', secondary: true, onSelect: function(){ skipProfile(step); } }
            ]);
          } else {
            setComposer(true, step.type === 'number' ? 'Вкажи вік числом...' : 'Напишіть відповідь...');
            var extraOptions = [];
            if (step.id === 'city' && detectedCity) {
              extraOptions.push({ label: '📍 ' + detectedCity, onSelect: function(){ answerProfile(step, detectedCity, detectedCity); } });
            }
            if (step.optional) {
              extraOptions.push({ label: 'Пропустити', secondary: true, onSelect: function(){ skipProfile(step); } });
            }
            if (extraOptions.length) showOptions(extraOptions);
          }
        });
      }

      function answerProfile(step, value, displayText){
        removeOptions();
        addBubble(displayText, 'user');
        profileData[step.id] = value;
        // The signature moment: the whole app takes the user's colour.
        if (step.id === 'gender' && window.SixtioTheme) {
          window.SixtioTheme.setGender(value);
        }
        pIndex++;
        askNextProfile();
      }

      function skipProfile(step){
        removeOptions();
        addBubble('Пропустити', 'user');
        pIndex++;
        askNextProfile();
      }

      function handleProfileText(value){
        var step = profileSteps[pIndex];
        if (step.type === 'number') {
          var age = parseInt(value, 10);
          if (!/^\d{2,3}$/.test(value.trim()) || age < 18 || age > 100) {
            addBubble(value, 'user');
            showTyping(function(){
              addBubble(age < 18 ? 'Sixtio знайомить лише повнолітніх — вкажи вік від 18 🙂' : 'Вкажи, будь ласка, вік числом — наприклад, 25', 'bot');
              setComposer(true, 'Вкажи вік числом...');
            });
            return;
          }
          answerProfile(step, age, value.trim());
          return;
        }
        if (step.id === 'interests') {
          var list = value.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
          answerProfile(step, list, value);
          return;
        }
        answerProfile(step, value, value);
      }

      function submitProfileInfo(){
        setComposer(false);
        var typingEl = startTyping();
        api('/api/profile-info', {
          gender: profileData.gender,
          seekingGender: profileData.seekingGender,
          goal: profileData.goal,
          age: profileData.age,
          city: profileData.city || '',
          interests: profileData.interests || [],
          bio: profileData.bio || ''
        }).catch(function(e){
          console.error('profile-info save failed', e);
        }).then(function(){
          typingEl.remove();
          startPsych();
        });
      }

      function startPsych(){
        stage = 'psych';
        index = 0;
        askNext();
      }

      // ---- photo upload ---------------------------------------------------
      photoInput.addEventListener('change', function(){
        var file = photoInput.files && photoInput.files[0];
        photoInput.value = '';
        if (!file) return;
        removeOptions();
        var reader = new FileReader();
        reader.onload = function(){
          var img = new Image();
          img.onload = function(){
            var MAX = 1024;
            var scale = Math.min(1, MAX / Math.max(img.width, img.height));
            var canvas = document.createElement('canvas');
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            var dataUrl = canvas.toDataURL('image/jpeg', 0.82);
            addPhotoBubble(dataUrl);
            var typingEl = startTyping();
            api('/api/photo', { imageBase64: dataUrl }).then(function(){
              typingEl.remove();
              addBubble('Чудове фото! 📸', 'bot');
              pIndex++;
              askNextProfile();
            }).catch(function(){
              typingEl.remove();
              addBubble('Не вдалося завантажити фото — спробуємо пізніше, це не завадить знайомству.', 'bot');
              pIndex++;
              askNextProfile();
            });
          };
          img.onerror = function(){
            addBubble('Не вдалося прочитати це фото. Спробуй інше.', 'bot');
            askNextProfile();
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });

      // ---- psych stage (main questions + AI follow-ups) -------------------
      function askNext(){
        updateProgress();
        if (index >= questions.length) {
          finish();
          return;
        }
        setComposer(false);
        showTyping(function(){
          addBubble(stepText(questions[index]), 'bot');
          setComposer(true);
        });
      }

      function autosize(){
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 110) + 'px';
      }
      input.addEventListener('input', autosize);

      composer.addEventListener('submit', function(e){
        e.preventDefault();
        var value = input.value.trim();
        if (!value || input.disabled) return;

        input.value = '';
        autosize();
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(err){} }

        if (stage === 'profile') {
          removeOptions();
          handleProfileText(value);
          return;
        }

        if (index >= questions.length) return;
        var q = questions[index];
        var isFollowup = (phase === 'followup');
        var questionId = isFollowup ? q.id + '_f' : q.id;

        addBubble(value, 'user');
        answers.push({
          question_id: questionId,
          question: isFollowup ? lastFollowupText : stepText(q),
          answer: value
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));

        setComposer(false);
        var typingEl = startTyping();

        function advance(){
          phase = 'main';
          index++;
          askNext();
        }

        api('/api/answer', {
          questionId: questionId,
          questionText: stepText(q),
          answerText: value,
          isFollowup: isFollowup,
          skipFollowup: DEEPEN,
          gender: profileData.gender || null
        }).then(function(resp){
          typingEl.remove();
          if (!isFollowup && resp && resp.followup) {
            phase = 'followup';
            lastFollowupText = resp.followup;
            addBubble(resp.followup, 'bot');
            setComposer(true);
          } else {
            advance();
          }
        }).catch(function(){
          // Бекенд недоступний — відповіді лишаються в localStorage, діалог не блокуємо.
          typingEl.remove();
          advance();
        });
      });

      input.addEventListener('keydown', function(e){
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          composer.requestSubmit ? composer.requestSubmit() : composer.dispatchEvent(new Event('submit', { cancelable:true }));
        }
      });

      // ---- finish ----------------------------------------------------------
      function renderProfileCard(profile){
        var card = document.createElement('div');
        card.className = 'profile-card';

        var check = document.createElement('div');
        check.className = 'check';
        check.textContent = '✨';

        var title = document.createElement('div');
        title.className = 'title';
        title.textContent = 'Ось як Sixtio тебе зрозуміла';

        var chips = document.createElement('div');
        chips.className = 'chips';
        (profile.traits || []).forEach(function(trait){
          var chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = trait;
          chips.appendChild(chip);
        });

        var summary = document.createElement('div');
        summary.className = 'summary';
        summary.textContent = profile.summary || '';

        var next = document.createElement('div');
        next.className = 'next';
        next.textContent = 'Скоро Sixtio запропонує перше знайомство.';

        card.appendChild(check);
        card.appendChild(title);
        card.appendChild(chips);
        card.appendChild(summary);
        card.appendChild(next);
        chat.appendChild(card);
        scrollToBottom();
      }

      function renderFallbackCard(){
        var card = document.createElement('div');
        card.className = 'bubble done-card';
        card.style.opacity = 1;
        card.innerHTML = '<div class="check">✨</div>' +
          '<div class="title">Дякую, що поділився(-лась)</div>' +
          '<div class="sub">Sixtio вже аналізує твої відповіді, щоб знайти людину зі справжньою сумісністю. Скоро продовжимо.</div>';
        chat.appendChild(card);
        scrollToBottom();
      }

      function addContinueButton(){
        var btn = document.createElement('button');
        btn.className = 'continue-btn';
        btn.textContent = 'Продовжити';
        btn.addEventListener('click', function(){
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(err){} }
          window.location.href = DEEPEN ? 'profile.html' : 'matches.html';
        });
        chat.appendChild(btn);
        scrollToBottom();
      }

      function finish(){
        localStorage.setItem('sixtio_onboarding_complete', 'true');
        composer.classList.add('hidden');
        var typingEl = startTyping();
        api('/api/profile', {}).then(function(profile){
          typingEl.remove();
          if (profile && profile.traits) {
            localStorage.setItem('sixtio_profile', JSON.stringify(profile));
            renderProfileCard(profile);
          } else {
            renderFallbackCard();
          }
          addContinueButton();
        }).catch(function(){
          typingEl.remove();
          renderFallbackCard();
          addContinueButton();
        });
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(err){} }
      }

      // ---- init -------------------------------------------------------------
      if (DEEPEN) {
        // Short enrichment session: greet and go straight to the extra questions.
        showTyping(function(){
          addBubble('Рада бачити тебе знову! Кілька нових запитань — і я зрозумію тебе ще глибше ✨', 'bot');
          askNext();
        });
      } else {
        // If this account already finished onboarding, skip straight to matches.
        api('/api/me', {}).then(function(me){
          if (me && me.user && me.user.gender && window.SixtioTheme) {
            window.SixtioTheme.setGender(me.user.gender);
          }
          if (me && me.profile) {
            localStorage.setItem('sixtio_profile', JSON.stringify(me.profile));
            window.location.replace('matches.html');
          } else {
            askNextProfile();
          }
        }).catch(function(){
          if (localStorage.getItem('sixtio_onboarding_complete') === 'true') {
            window.location.replace('matches.html');
          } else {
            askNextProfile();
          }
        });
      }
    })();
  </script>
</body>
</html>
