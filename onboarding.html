<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — знайомство</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #16151c);
    --hint: var(--tg-theme-hint-color, #8b8a94);
    --card: var(--tg-theme-secondary-bg-color, #f4f3f8);
    --violet: #7F77DD;
    --violet-deep: #534AB7;
    --teal: #1D9E75;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column;
    min-height:100dvh;
    overflow:hidden;
  }

  /* progress header */
  .header{ padding:calc(env(safe-area-inset-top) + 14px) 20px 12px; }
  .progress-track{ height:5px; border-radius:3px; background:var(--card); overflow:hidden; }
  .progress-fill{ height:100%; width:0%; border-radius:3px;
    background:linear-gradient(90deg,var(--violet-deep),var(--teal));
    transition:width .45s ease; }
  .step-label{ margin-top:8px; font-size:12px; color:var(--hint); text-align:center; }

  /* chat area */
  .chat{ flex:1; overflow-y:auto; padding:8px 16px 12px; display:flex; flex-direction:column; gap:10px;
    -webkit-overflow-scrolling:touch; }
  .bubble{ max-width:82%; padding:12px 14px; border-radius:16px; font-size:15px; line-height:1.45;
    animation:pop .25s ease; opacity:0; animation-fill-mode:forwards; }
  @keyframes pop{ from{ opacity:0; transform:translateY(6px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
  .bubble.bot{ align-self:flex-start; background:var(--card); color:var(--text); border-bottom-left-radius:4px; }
  .bubble.user{ align-self:flex-end; background:var(--violet-deep); color:#fff; border-bottom-right-radius:4px; }
  .bubble.typing{ align-self:flex-start; background:var(--card); display:flex; gap:4px; align-items:center; padding:14px 16px; }
  .typing-dot{ width:6px; height:6px; border-radius:50%; background:var(--hint); animation:blink 1.2s infinite ease-in-out; }
  .typing-dot:nth-child(2){ animation-delay:.15s; }
  .typing-dot:nth-child(3){ animation-delay:.3s; }
  @keyframes blink{ 0%,80%,100%{ opacity:.25; transform:scale(.85); } 40%{ opacity:1; transform:scale(1); } }

  /* completion / profile card */
  .done-card{ align-self:center; text-align:center; max-width:92%; padding:18px; margin-top:8px; }
  .done-card .check{ font-size:30px; margin-bottom:6px; }
  .done-card .title{ font-size:17px; font-weight:600; margin-bottom:4px; }
  .done-card .sub{ font-size:13px; color:var(--hint); line-height:1.5; }
  .profile-card{ align-self:center; width:92%; margin-top:8px; padding:20px 18px;
    border-radius:18px; background:var(--card); text-align:center;
    animation:pop .3s ease; opacity:0; animation-fill-mode:forwards; }
  .profile-card .check{ font-size:28px; margin-bottom:6px; }
  .profile-card .title{ font-size:17px; font-weight:600; margin-bottom:12px;
    background:linear-gradient(90deg,var(--violet-deep),var(--teal));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:14px; }
  .chip{ font-size:13px; font-weight:500; padding:6px 12px; border-radius:999px;
    color:#fff; background:var(--violet-deep); }
  .chip:nth-child(even){ background:var(--teal); }
  .profile-card .summary{ font-size:14px; line-height:1.55; color:var(--text); }
  .profile-card .next{ font-size:12px; color:var(--hint); margin-top:12px; }
  .continue-btn{ align-self:center; width:92%; margin:12px 0 8px; border:none; border-radius:14px;
    padding:15px; font-size:16px; font-weight:600; color:#fff; background:var(--violet-deep);
    cursor:pointer; transition:transform .12s ease, opacity .12s ease;
    animation:pop .3s ease; opacity:0; animation-fill-mode:forwards; }
  .continue-btn:active{ transform:scale(0.98); opacity:.92; }

  /* composer */
  .composer{ display:flex; gap:8px; align-items:flex-end;
    padding:10px 16px calc(env(safe-area-inset-bottom) + 10px); border-top:1px solid var(--card); }
  .composer textarea{ flex:1; resize:none; max-height:110px; min-height:44px;
    border:1px solid var(--card); border-radius:14px; padding:12px 14px; font-size:15px;
    font-family:inherit; color:var(--text); background:var(--card); outline:none; line-height:1.4; }
  .composer textarea::placeholder{ color:var(--hint); }
  .composer button{ flex-shrink:0; width:44px; height:44px; border:none; border-radius:50%;
    background:var(--violet-deep); color:#fff; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s ease, opacity .12s ease; }
  .composer button:active{ transform:scale(0.94); opacity:.9; }
  .composer button:disabled{ opacity:.4; }
  .composer.hidden{ display:none; }
</style>
</head>
<body>
  <div class="header">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="step-label" id="stepLabel">Питання 1 з 7</div>
  </div>

  <div class="chat" id="chat"></div>

  <form class="composer" id="composer">
    <textarea id="answerInput" rows="1" placeholder="Напишіть відповідь..."></textarea>
    <button type="submit" id="sendBtn" aria-label="Надіслати">➤</button>
  </form>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('secondary_bg_color'); } catch(e){}
      }

      // Keep ids in sync with api/_lib/questions.js
      var questions = [
        { id: "q1", text: "Опиши свій ідеальний будній вечір — з ким ти і що відбувається?" },
        { id: "q2", text: "Ти більше живеш за чітким планом чи любиш спонтанність? Розкажи на прикладі." },
        { id: "q3", text: "Що в людях чи в стосунках дратує тебе найбільше?" },
        { id: "q4", text: "Коли виникає конфлікт — ти одразу говориш про це, береш паузу подумати чи мовчиш?" },
        { id: "q5", text: "Що для тебе означає справжня близькість з людиною?" },
        { id: "q6", text: "Згадай момент за останній рік, коли ти відчував(-ла) себе по-справжньому щасливим(-ою). Що тоді відбувалось?" },
        { id: "q7", text: "Що тобі найбільше потрібно від партнера, коли тобі важко?" }
      ];

      var chat = document.getElementById('chat');
      var composer = document.getElementById('composer');
      var input = document.getElementById('answerInput');
      var sendBtn = document.getElementById('sendBtn');
      var progressFill = document.getElementById('progressFill');
      var stepLabel = document.getElementById('stepLabel');

      var STORAGE_KEY = 'sixtio_onboarding_answers';
      var index = 0;
      var answers = [];
      var phase = 'main'; // 'main' — чекаємо відповідь на основне питання, 'followup' — на підпитання

      function api(path, payload){
        var body = Object.assign({ initData: (tg && tg.initData) || '' }, payload);
        var controller = ('AbortController' in window) ? new AbortController() : null;
        if (controller) setTimeout(function(){ controller.abort(); }, 25000);
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller ? controller.signal : undefined
        }).then(function(r){
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      }

      function scrollToBottom(){
        requestAnimationFrame(function(){ chat.scrollTop = chat.scrollHeight; });
      }

      function addBubble(text, who){
        var el = document.createElement('div');
        el.className = 'bubble ' + who;
        el.textContent = text;
        chat.appendChild(el);
        scrollToBottom();
        return el;
      }

      function updateProgress(){
        var pct = Math.min(index, questions.length) / questions.length * 100;
        progressFill.style.width = pct + '%';
        stepLabel.textContent = index < questions.length
          ? 'Питання ' + (index + 1) + ' з ' + questions.length
          : 'Готово';
      }

      function startTyping(){
        var el = document.createElement('div');
        el.className = 'bubble typing';
        el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        el.style.opacity = 1;
        chat.appendChild(el);
        scrollToBottom();
        return el;
      }

      function showTyping(callback){
        var el = startTyping();
        setTimeout(function(){
          el.remove();
          callback();
        }, 550 + Math.random() * 350);
      }

      function askNext(){
        updateProgress();
        if (index >= questions.length) {
          finish();
          return;
        }
        input.disabled = true;
        sendBtn.disabled = true;
        showTyping(function(){
          addBubble(questions[index].text, 'bot');
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
        });
      }

      function autosize(){
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 110) + 'px';
      }
      input.addEventListener('input', autosize);

      var lastFollowupText = '';

      composer.addEventListener('submit', function(e){
        e.preventDefault();
        var value = input.value.trim();
        if (!value || index >= questions.length || input.disabled) return;

        var q = questions[index];
        var isFollowup = (phase === 'followup');
        var questionId = isFollowup ? q.id + '_f' : q.id;

        addBubble(value, 'user');
        answers.push({
          question_id: questionId,
          question: isFollowup ? lastFollowupText : q.text,
          answer: value
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));

        input.value = '';
        autosize();
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(err){} }

        input.disabled = true;
        sendBtn.disabled = true;
        var typingEl = startTyping();

        function advance(){
          phase = 'main';
          index++;
          askNext();
        }

        api('/api/answer', {
          questionId: questionId,
          questionText: q.text,
          answerText: value,
          isFollowup: isFollowup
        }).then(function(resp){
          typingEl.remove();
          if (!isFollowup && resp && resp.followup) {
            phase = 'followup';
            lastFollowupText = resp.followup;
            addBubble(resp.followup, 'bot');
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
          } else {
            advance();
          }
        }).catch(function(){
          // Бекенд недоступний — відповіді лишаються в localStorage, діалог не блокуємо.
          typingEl.remove();
          advance();
        });
      });

      input.addEventListener('keydown', function(e){
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          composer.requestSubmit ? composer.requestSubmit() : composer.dispatchEvent(new Event('submit', { cancelable:true }));
        }
      });

      function renderProfileCard(profile){
        var card = document.createElement('div');
        card.className = 'profile-card';

        var check = document.createElement('div');
        check.className = 'check';
        check.textContent = '✨';

        var title = document.createElement('div');
        title.className = 'title';
        title.textContent = 'Ось як Sixtio тебе зрозуміла';

        var chips = document.createElement('div');
        chips.className = 'chips';
        (profile.traits || []).forEach(function(trait){
          var chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = trait;
          chips.appendChild(chip);
        });

        var summary = document.createElement('div');
        summary.className = 'summary';
        summary.textContent = profile.summary || '';

        var next = document.createElement('div');
        next.className = 'next';
        next.textContent = 'Скоро Sixtio запропонує перше знайомство.';

        card.appendChild(check);
        card.appendChild(title);
        card.appendChild(chips);
        card.appendChild(summary);
        card.appendChild(next);
        chat.appendChild(card);
        scrollToBottom();
      }

      function renderFallbackCard(){
        var card = document.createElement('div');
        card.className = 'bubble done-card';
        card.style.opacity = 1;
        card.innerHTML = '<div class="check">✨</div>' +
          '<div class="title">Дякую, що поділився(-лась)</div>' +
          '<div class="sub">Sixtio вже аналізує твої відповіді, щоб знайти людину зі справжньою сумісністю. Скоро продовжимо.</div>';
        chat.appendChild(card);
        scrollToBottom();
      }

      function addContinueButton(){
        var btn = document.createElement('button');
        btn.className = 'continue-btn';
        btn.textContent = 'Продовжити';
        btn.addEventListener('click', function(){
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('medium'); } catch(err){} }
          window.location.href = 'waiting.html';
        });
        chat.appendChild(btn);
        scrollToBottom();
      }

      function finish(){
        localStorage.setItem('sixtio_onboarding_complete', 'true');
        composer.classList.add('hidden');
        var typingEl = startTyping();
        api('/api/profile', {}).then(function(profile){
          typingEl.remove();
          if (profile && profile.traits) {
            localStorage.setItem('sixtio_profile', JSON.stringify(profile));
            renderProfileCard(profile);
          } else {
            renderFallbackCard();
          }
          addContinueButton();
        }).catch(function(){
          typingEl.remove();
          renderFallbackCard();
          addContinueButton();
        });
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(err){} }
      }

      // If this account already finished onboarding, skip straight to the waiting screen.
      api('/api/me', {}).then(function(me){
        if (me && me.profile) {
          localStorage.setItem('sixtio_profile', JSON.stringify(me.profile));
          window.location.replace('waiting.html');
        } else {
          askNext();
        }
      }).catch(function(){
        if (localStorage.getItem('sixtio_onboarding_complete') === 'true') {
          window.location.replace('waiting.html');
        } else {
          askNext();
        }
      });
    })();
  </script>
</body>
</html>
