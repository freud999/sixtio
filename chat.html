<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — чат</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js?v=36"></script>
<script src="theme.js?v=36"></script>
<script src="paywall.js?v=36"></script>
<link rel="stylesheet" href="theme.css?v=36" />
<style>
  body{
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 16px) 16px 12px;
    overflow-y:auto; gap:12px;
  }
  body > *{ position:relative; z-index:1; }
  .bg-dots, .bg-aura{ z-index:0; }

  /* Clarity screen header */
  .scr-head{ width:100%; max-width:460px; display:flex; align-items:flex-end; justify-content:space-between; }
  .scr-title{ font-size:28px; font-weight:600; letter-spacing:-.02em; color:var(--ink); }

  .list{ width:100%; max-width:460px; display:flex; flex-direction:column; gap:10px; }
  /* Conversation rows are <a> elements — never render as underlined hyperlinks. */
  .conv{ display:flex; align-items:center; gap:14px; width:100%; text-align:left;
    padding:12px 13px; border-radius:22px; cursor:pointer; font-family:inherit; color:var(--ink);
    text-decoration:none; background:var(--surface); box-shadow:0 12px 30px -20px rgba(60,45,30,.5);
    transition:transform .12s ease; }
  .conv:active{ transform:scale(.99); }
  .c-ava{ width:52px; height:52px; border-radius:50%; object-fit:cover; flex-shrink:0; }
  .c-ava-ph{ width:52px; height:52px; border-radius:50%; flex-shrink:0; display:flex;
    align-items:center; justify-content:center; font-size:24px;
    background:var(--chip); border:1px solid var(--hair); color:var(--muted); }
  .c-main{ flex:1; min-width:0; }
  /* Name+age always render in full — wrap instead of ellipsing (Task 25). */
  .c-name{ font-size:16.5px; font-weight:600; line-height:1.25; color:var(--ink); overflow-wrap:break-word; }
  .c-last{ font-size:12.5px; color:var(--muted); margin-top:3px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .c-last.unseen{ color:var(--ink); font-weight:600; }
  .c-chev{ flex-shrink:0; font-size:20px; color:var(--faint); }

  /* AI-hint inset */
  .ai-hint{ width:100%; max-width:460px; display:flex; align-items:flex-start; gap:11px;
    margin-top:8px; padding:15px; border-radius:20px;
    background:var(--chip2); border:1px solid rgba(var(--acc-rgb),.1); }
  .ai-hint .spk{ font-size:15px; line-height:1; }
  .ai-hint .txt{ font-size:12px; line-height:1.45; color:var(--ink3); }
  .ai-hint .txt b{ color:var(--acc); font-weight:600; }

  .empty{ max-width:340px; text-align:center; font-size:13px; line-height:1.6;
    color:var(--muted); padding:18px; margin-top:12px; }
  .empty .spark{ font-size:26px; display:block; margin-bottom:8px; }
  .empty a{ color:var(--acc); font-weight:600; text-decoration:none; }
</style>
</head>
<body class="has-tab-bar">
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="scr-head">
    <div class="scr-title" data-i18n="tab_chat">Чат</div>
    <div class="hbar">
      <button class="theme-toggle" data-theme-toggle type="button"></button>
      <button class="stars-pill" id="starsPill" type="button"><span class="sstar">⭐</span><span id="starsVal">0</span></button>
    </div>
  </div>

  <div class="list" id="list"></div>

  <div class="ai-hint" id="aiHint" hidden>
    <span class="spk">✨</span>
    <span class="txt" data-i18n-html="chat_ai_hint"><b>AI-підказка ·&nbsp;</b>Sixtio пропонує теми для розмови на основі ваших спільних цінностей.</span>
  </div>

  <div class="empty glass" id="empty" hidden>
    <span class="spark">💬</span>
    <span data-i18n-html="chat_empty">Тут зʼявляться розмови з твоїми парами. Поки метчів немає — зазирни у <a href="matches.html">Метчі</a> й натисни «Знайти пару».</span>
  </div>

  <nav class="tab-bar" aria-label="Навігація">
    <a class="tab-item" href="feed.html" aria-label="Стрічка"><span class="tico"><svg viewBox="0 0 24 24"><rect x="4" y="4.5" width="16" height="7" rx="2.2"/><rect x="4" y="14" width="16" height="5.5" rx="2"/></svg></span></a>
    <a class="tab-item" href="matches.html" aria-label="Метчі"><span class="tico"><svg viewBox="0 0 24 24"><path d="M12 20.4S3.6 15.4 3.6 9.3C3.6 6.2 5.9 4.2 8.3 4.6 10 4.9 11.3 6 12 7.3 12.7 6 14 4.9 15.7 4.6c2.4-.4 4.7 1.6 4.7 4.7 0 6.1-8.4 11.1-8.4 11.1z"/></svg></span></a>
    <a class="tab-item active" href="chat.html" aria-label="Чат"><span class="tico"><svg viewBox="0 0 24 24"><path d="M20 3.5H4A1.6 1.6 0 0 0 2.4 5.1v9.6A1.6 1.6 0 0 0 4 16.3h3.2v4L11.7 16.3H20a1.6 1.6 0 0 0 1.6-1.6V5.1A1.6 1.6 0 0 0 20 3.5z"/></svg></span></a>
    <a class="tab-item" href="profile.html" aria-label="Профіль"><span class="tico"><svg viewBox="0 0 24 24"><circle cx="12" cy="7.6" r="3.8"/><path d="M4.8 20a7.2 7.2 0 0 1 14.4 0z"/></svg></span></a>
  </nav>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
      }
      var initData = (tg && tg.initData) || '';
      var t = SixtioI18n.t;   // localized copy (uk/en/ru) — Task 26
      var listEl = document.getElementById('list');
      var emptyEl = document.getElementById('empty');

      function api(path, payload){
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.assign({ initData: initData }, payload))
        }).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
      }

      function conv(m){
        var pt = m.partner || {};
        var a = document.createElement('a');
        a.className = 'conv faux-glass';
        a.href = 'conversation.html?match=' + encodeURIComponent(m.matchId);
        if (tg && tg.HapticFeedback) {
          a.addEventListener('click', function(){ try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} });
        }

        if (pt.photoUrl) {
          var img = document.createElement('img');
          img.className = 'c-ava'; img.src = pt.photoUrl; img.alt = '';
          a.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.className = 'c-ava-ph'; ph.textContent = '🙂';
          a.appendChild(ph);
        }

        var main = document.createElement('div'); main.className = 'c-main';
        var nm = document.createElement('div'); nm.className = 'c-name';
        nm.textContent = pt.name + (pt.age ? ', ' + pt.age : '');
        main.appendChild(nm);

        var last = document.createElement('div'); last.className = 'c-last';
        if (m.lastMessage && m.lastMessage.text) {
          last.textContent = (m.lastMessage.mine ? t('chat_you') : '') + m.lastMessage.text;
          if (!m.lastMessage.mine) last.classList.add('unseen');
        } else {
          last.textContent = t('chat_start');
        }
        main.appendChild(last);
        a.appendChild(main);

        var chev = document.createElement('div'); chev.className = 'c-chev'; chev.textContent = '›';
        a.appendChild(chev);
        return a;
      }

      var starsBal = 0;
      function render(me){
        if (me.user && me.user.gender && window.SixtioTheme) {
          window.SixtioTheme.setGender(me.user.gender);
        }
        if (me.user && typeof me.user.starsBalance === 'number') starsBal = me.user.starsBalance;
        var sv = document.getElementById('starsVal'); if (sv) sv.textContent = starsBal;
        var matches = me.matches || [];
        listEl.innerHTML = '';
        var aiHint = document.getElementById('aiHint');
        if (matches.length) {
          emptyEl.hidden = true;
          matches.forEach(function(m){ listEl.appendChild(conv(m)); });
          if (aiHint) aiHint.hidden = false;
        } else {
          emptyEl.hidden = false;
          if (aiHint) aiHint.hidden = true;
        }
      }

      // Header Stars pill → open the Stars shop.
      var starsPill = document.getElementById('starsPill');
      if (starsPill) starsPill.addEventListener('click', function(){
        if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} }
        if (window.SixtioPaywall) window.SixtioPaywall.open({
          initData: initData, starsBalance: starsBal,
          onSuccess: function(){ window.location.reload(); }
        });
      });

      // Cache-first paint, then refresh.
      try {
        var cached = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
        if (cached && cached.registered) render(cached);
      } catch(e){}

      api('/api/me', {}).then(function(me){
        if (!me.registered) { window.location.replace('onboarding.html'); return; }
        localStorage.setItem('sixtio_me', JSON.stringify(me));
        render(me);
      }).catch(function(){ /* offline — cache shown */ });
    })();
  </script>
</body>
</html>
