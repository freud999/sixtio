<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sixtio — чат</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="i18n.js?v=33"></script>
<script src="theme.js?v=33"></script>
<link rel="stylesheet" href="theme.css?v=33" />
<style>
  body{
    display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 16px) 16px 12px;
    overflow-y:auto; gap:12px;
  }
  body > *{ position:relative; z-index:1; }
  .bg-dots, .bg-aura{ z-index:0; }

  .list{ width:100%; max-width:460px; display:flex; flex-direction:column; gap:10px; }
  /* Conversation rows are <a> elements — never render as underlined hyperlinks. */
  .conv{ display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:11px 12px; border-radius:20px; cursor:pointer; font-family:inherit; color:var(--text);
    text-decoration:none; transition:transform .12s ease; }
  .conv:active{ transform:scale(.985); }
  .c-ava{ width:56px; height:56px; border-radius:50%; object-fit:cover; flex-shrink:0;
    border:2px solid transparent; background:
      linear-gradient(var(--bg),var(--bg)) padding-box,
      linear-gradient(120deg, var(--a2), var(--a1)) border-box; }
  .c-ava-ph{ width:56px; height:56px; border-radius:50%; flex-shrink:0; display:flex;
    align-items:center; justify-content:center; font-size:26px;
    background:var(--faux-glass); border:1px solid var(--glass-border); color:var(--hint); }
  .c-main{ flex:1; min-width:0; }
  /* Name+age always render in full — wrap instead of ellipsing (Task 25). */
  .c-name{ font-size:16px; font-weight:700; line-height:1.25; overflow-wrap:break-word; }
  .c-last{ font-size:13px; color:var(--hint); margin-top:2px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .c-last.unseen{ color:var(--text); font-weight:600; }
  .c-chev{ flex-shrink:0; font-size:22px; color:var(--a1); opacity:.7; }

  .empty{ max-width:340px; text-align:center; font-size:13px; line-height:1.6;
    color:var(--hint); padding:18px; margin-top:12px; }
  .empty .spark{ font-size:26px; display:block; margin-bottom:8px; }
  .empty a{ color:var(--a1); font-weight:600; text-decoration:none; }
</style>
</head>
<body class="has-tab-bar">
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-aura one" aria-hidden="true"></div>
  <div class="bg-aura two" aria-hidden="true"></div>

  <div class="list" id="list"></div>

  <div class="empty glass" id="empty" hidden>
    <span class="spark">💬</span>
    <span data-i18n-html="chat_empty">Тут зʼявляться розмови з твоїми парами. Поки метчів немає — зазирни у <a href="matches.html">Метчі</a> й натисни «Знайти пару».</span>
  </div>

  <nav class="tab-bar">
    <a class="tab-item" href="matches.html"><span class="ico">💜</span><span data-i18n="tab_matches">Метчі</span></a>
    <a class="tab-item active" href="chat.html"><span class="ico">💬</span><span data-i18n="tab_chat">Чат</span></a>
    <a class="tab-item" href="profile.html"><span class="ico">👤</span><span data-i18n="tab_profile">Профіль</span></a>
  </nav>

  <script>
    (function(){
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        try { tg.setHeaderColor && tg.setHeaderColor('bg_color'); } catch(e){}
      }
      var initData = (tg && tg.initData) || '';
      var t = SixtioI18n.t;   // localized copy (uk/en/ru) — Task 26
      var listEl = document.getElementById('list');
      var emptyEl = document.getElementById('empty');

      function api(path, payload){
        return fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(Object.assign({ initData: initData }, payload))
        }).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
      }

      function conv(m){
        var pt = m.partner || {};
        var a = document.createElement('a');
        a.className = 'conv faux-glass';
        a.href = 'conversation.html?match=' + encodeURIComponent(m.matchId);
        if (tg && tg.HapticFeedback) {
          a.addEventListener('click', function(){ try { tg.HapticFeedback.impactOccurred('light'); } catch(e){} });
        }

        if (pt.photoUrl) {
          var img = document.createElement('img');
          img.className = 'c-ava'; img.src = pt.photoUrl; img.alt = '';
          a.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.className = 'c-ava-ph'; ph.textContent = '🙂';
          a.appendChild(ph);
        }

        var main = document.createElement('div'); main.className = 'c-main';
        var nm = document.createElement('div'); nm.className = 'c-name';
        nm.textContent = pt.name + (pt.age ? ', ' + pt.age : '');
        main.appendChild(nm);

        var last = document.createElement('div'); last.className = 'c-last';
        if (m.lastMessage && m.lastMessage.text) {
          last.textContent = (m.lastMessage.mine ? t('chat_you') : '') + m.lastMessage.text;
          if (!m.lastMessage.mine) last.classList.add('unseen');
        } else {
          last.textContent = t('chat_start');
        }
        main.appendChild(last);
        a.appendChild(main);

        var chev = document.createElement('div'); chev.className = 'c-chev'; chev.textContent = '›';
        a.appendChild(chev);
        return a;
      }

      function render(me){
        if (me.user && me.user.gender && window.SixtioTheme) {
          window.SixtioTheme.setGender(me.user.gender);
        }
        var matches = me.matches || [];
        listEl.innerHTML = '';
        if (matches.length) {
          emptyEl.hidden = true;
          matches.forEach(function(m){ listEl.appendChild(conv(m)); });
        } else {
          emptyEl.hidden = false;
        }
      }

      // Cache-first paint, then refresh.
      try {
        var cached = JSON.parse(localStorage.getItem('sixtio_me') || 'null');
        if (cached && cached.registered) render(cached);
      } catch(e){}

      api('/api/me', {}).then(function(me){
        if (!me.registered) { window.location.replace('onboarding.html'); return; }
        localStorage.setItem('sixtio_me', JSON.stringify(me));
        render(me);
      }).catch(function(){ /* offline — cache shown */ });
    })();
  </script>
</body>
</html>
